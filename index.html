<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת אבחון עיניים - V5 (Data & Memory Control)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-4 font-sans h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // נקודות ציון מ-MediaPipe
        const LEFT_PUPIL = 468; const RIGHT_PUPIL = 473;
        const RIGHT_EYE_INNER = 133; const RIGHT_EYE_OUTER = 33;
        const LEFT_EYE_INNER = 362; const LEFT_EYE_OUTER = 263;
        const RIGHT_EYE_TOP = 159; const RIGHT_EYE_BOTTOM = 145;
        const LEFT_EYE_TOP = 386; const LEFT_EYE_BOTTOM = 374;

        // מגבלת זיכרון להקלטה בודדת (מונע קריסת דפדפן)
        const MAX_SAMPLES_PER_RUN = 15000;

        function RunCharts({ data }) {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!chartRef.current || !data || data.length === 0) return;
                const ctx = chartRef.current.getContext('2d');
                if (chartInstance.current) chartInstance.current.destroy();

                const labels = data.map(d => d.timeOffset.toFixed(1) + 's');
                const ipdData = data.map(d => d.ipd);
                const jitterData = data.map(d => d.jitterAvg);

                chartInstance.current = new window.Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'IPD (פיקסלים)', data: ipdData, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 2, yAxisID: 'y', pointRadius: 0, tension: 0.3 },
                            { label: 'ריצוד (%)', data: jitterData, borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', borderWidth: 1, yAxisID: 'y1', pointRadius: 0, fill: true, tension: 0.2 }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, animation: false, interaction: { mode: 'index', intersect: false },
                        scales: {
                            x: { ticks: { color: '#94a3b8', maxTicksLimit: 8 } },
                            y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'IPD', color: '#3b82f6' } },
                            y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Jitter', color: '#ef4444' }, grid: { drawOnChartArea: false } }
                        }
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [data]);

            return <canvas ref={chartRef} style={{ height: '200px', width: '100%' }}></canvas>;
        }

        function App() {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const animationRef = useRef(null);
            
            const isRecordingRef = useRef(false);
            const runStartTimeRef = useRef(null);
            const currentRunDataRef = useRef([]);
            const currentRunBlinksRef = useRef([]);
            const isBlinkingStateRef = useRef(false);
            const lastNormPosRef = useRef({ left: 50, right: 50 });

            const [cameraActive, setCameraActive] = useState(false);
            const [testState, setTestState] = useState('idle');
            const [memoryUsage, setMemoryUsage] = useState(0); // אחוז שימוש בזיכרון הנוכחי
            
            const [metrics, setMetrics] = useState({ ipd: 0, currentRunBlinks: 0, leftNorm: 0, rightNorm: 0, jitter: 0 });
            const [stimulusDisplay, setStimulusDisplay] = useState({ x: 50, y: 50, size: 40, isVisible: true });
            const stimulusRef = useRef({ x: 50, y: 50, size: 40 }); // Reference for immediate logging

            const [testConfig, setTestConfig] = useState({ type: 'tracking', color: '#3b82f6', durationSpeed: 2, trackVector: 'horizontal', convMinSize: 20, convMaxSize: 150 });
            const [runLogs, setRunLogs] = useState([]);

            useEffect(() => {
                let camera = null; let faceMesh = null;
                const startTracking = async () => {
                    if (!window.FaceMesh) return;
                    faceMesh = new window.FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
                    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
                    faceMesh.onResults(onResults);
                    camera = new window.Camera(videoRef.current, { onFrame: async () => { await faceMesh.send({ image: videoRef.current }); }, width: 640, height: 480 });
                    await camera.start();
                    setCameraActive(true);
                };
                setTimeout(startTracking, 1000);
            }, []);

            const onResults = useCallback((results) => {
                if (!canvasRef.current || !results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
                const ctx = canvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, 640, 480);
                
                const lm = results.multiFaceLandmarks[0];
                const width = 640; const height = 480;

                const rightInnerX = lm[RIGHT_EYE_INNER].x; const rightOuterX = lm[RIGHT_EYE_OUTER].x;
                const leftInnerX = lm[LEFT_EYE_INNER].x; const leftOuterX = lm[LEFT_EYE_OUTER].x;
                const rightPupilX = lm[RIGHT_PUPIL].x; const rightPupilY = lm[RIGHT_PUPIL].y;
                const leftPupilX = lm[LEFT_PUPIL].x; const leftPupilY = lm[LEFT_PUPIL].y;

                const rightNorm = ((rightPupilX - rightInnerX) / (rightOuterX - rightInnerX)) * 100;
                const leftNorm = ((leftPupilX - leftOuterX) / (leftInnerX - leftOuterX)) * 100;

                const deltaLeft = Math.abs(leftNorm - lastNormPosRef.current.left);
                const deltaRight = Math.abs(rightNorm - lastNormPosRef.current.right);
                const currentJitter = (deltaLeft + deltaRight) / 2;
                lastNormPosRef.current = { left: leftNorm, right: rightNorm };

                const dx = (leftPupilX - rightPupilX) * width;
                const dy = (leftPupilY - rightPupilY) * height;
                const ipdPx = Math.sqrt(dx*dx + dy*dy);

                const rightEyeH = Math.abs(lm[RIGHT_EYE_TOP].y - lm[RIGHT_EYE_BOTTOM].y);
                const leftEyeH = Math.abs(lm[LEFT_EYE_TOP].y - lm[LEFT_EYE_BOTTOM].y);
                let justBlinked = false;
                if ((rightEyeH + leftEyeH)/2 < 0.025) {
                    if (!isBlinkingStateRef.current) { isBlinkingStateRef.current = true; justBlinked = true; }
                } else { isBlinkingStateRef.current = false; }

                if (isRecordingRef.current && runStartTimeRef.current) {
                    const timeOffset = (Date.now() - runStartTimeRef.current) / 1000;
                    if (justBlinked) currentRunBlinksRef.current.push(timeOffset);
                    
                    // שמירת הנתונים המלאים למערך
                    currentRunDataRef.current.push({ 
                        timeOffset, 
                        ipd: parseFloat(ipdPx.toFixed(1)), 
                        leftNorm: parseFloat(leftNorm.toFixed(1)), 
                        rightNorm: parseFloat(rightNorm.toFixed(1)), 
                        leftRaw: { x: leftPupilX.toFixed(4), y: leftPupilY.toFixed(4) },
                        rightRaw: { x: rightPupilX.toFixed(4), y: rightPupilY.toFixed(4) },
                        jitterAvg: parseFloat(currentJitter.toFixed(2)),
                        blinkStatus: isBlinkingStateRef.current,
                        stimulus: { ...stimulusRef.current } // שמירת המיקום המדויק של הגירוי
                    });

                    // בקרת זיכרון
                    const currentSamples = currentRunDataRef.current.length;
                    const memPercent = (currentSamples / MAX_SAMPLES_PER_RUN) * 100;
                    setMemoryUsage(Math.min(memPercent, 100));

                    if (currentSamples >= MAX_SAMPLES_PER_RUN) {
                        handleStopForced("סכנת עומס זיכרון. הבדיקה נעצרה אוטומטית והנתונים נשמרו.");
                    }
                }

                setMetrics({ ipd: ipdPx.toFixed(1), currentRunBlinks: currentRunBlinksRef.current.length, leftNorm: leftNorm.toFixed(1), rightNorm: rightNorm.toFixed(1), jitter: currentJitter.toFixed(2) });
            }, []);

            useEffect(() => {
                if (testState !== 'running') return;
                let startTime = Date.now();
                
                const animate = () => {
                    const t = (Date.now() - startTime) / 1000;
                    let nextStimulus = { x: 50, y: 50, size: 40 };
                    
                    if (testConfig.type === 'tracking') {
                        const waveX = Math.sin(t * testConfig.durationSpeed) * 40;
                        if (testConfig.trackVector === 'horizontal') nextStimulus.x = 50 + waveX;
                        if (testConfig.trackVector === 'vertical') nextStimulus.y = 50 + waveX;
                        if (testConfig.trackVector === 'figure8') { nextStimulus.x = 50 + waveX; nextStimulus.y = 50 + Math.sin(t * testConfig.durationSpeed * 2) * 20; }
                    } else {
                        const scaleCycle = (Math.sin(t * testConfig.durationSpeed) + 1) / 2;
                        nextStimulus.size = testConfig.convMinSize + (scaleCycle * (testConfig.convMaxSize - testConfig.convMinSize));
                    }
                    
                    setStimulusDisplay(prev => ({ ...prev, ...nextStimulus }));
                    stimulusRef.current = nextStimulus; // Update ref for logging
                    animationRef.current = requestAnimationFrame(animate);
                };
                animationRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationRef.current);
            }, [testState, testConfig]);

            // פונקציה לעצירה מאולצת (עקב זיכרון)
            const handleStopForced = (reason) => {
                if (isRecordingRef.current) {
                    alert(reason);
                    handleTestSequence(); // Trigger standard stop and save
                }
            };

            const handleTestSequence = () => {
                if (testState === 'idle') {
                    setTestState('countdown');
                    setMemoryUsage(0);
                    setStimulusDisplay(prev => ({ ...prev, isVisible: true, size: testConfig.type === 'convergence' ? testConfig.convMinSize : 40 }));
                    
                    setTimeout(() => {
                        currentRunDataRef.current = []; currentRunBlinksRef.current = [];
                        runStartTimeRef.current = Date.now();
                        isRecordingRef.current = true;
                        setTestState('running');
                    }, 1000);
                } else if (testState === 'running') {
                    isRecordingRef.current = false;
                    setTestState('idle');
                    setStimulusDisplay(prev => ({ ...prev, x: 50, y: 50, size: 40 }));
                    
                    const duration = (Date.now() - runStartTimeRef.current) / 1000;
                    const logEntry = {
                        id: Date.now(), 
                        time: new Date().toLocaleTimeString(),
                        type: testConfig.type === 'tracking' ? `מעקב (${testConfig.trackVector})` : 'התכנסות (NPC)',
                        color: testConfig.color, 
                        duration: duration.toFixed(1), 
                        totalBlinks: currentRunBlinksRef.current.length,
                        blinkTimestamps: [...currentRunBlinksRef.current], 
                        data: [...currentRunDataRef.current] // הנתונים המלאים נשמרים כאן!
                    };
                    setRunLogs(prev => [logEntry, ...prev]);
                    setMemoryUsage(0);
                }
            };

            // ייצוא כלל הנתונים לקובץ JSON
            const exportDataToFile = () => {
                if (runLogs.length === 0) {
                    alert("אין נתונים לייצוא. אנא בצע לפחות בדיקה אחת.");
                    return;
                }
                const exportObj = {
                    exportDate: new Date().toISOString(),
                    patientInfo: "Anonymous",
                    sessions: runLogs
                };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObj, null, 2));
                const downloadAnchorElem = document.createElement('a');
                downloadAnchorElem.setAttribute("href", dataStr);
                downloadAnchorElem.setAttribute("download", `EyeTracker_Log_${Date.now()}.json`);
                document.body.appendChild(downloadAnchorElem);
                downloadAnchorElem.click();
                document.body.removeChild(downloadAnchorElem);
            };

            return (
                <div className="flex flex-col h-full gap-4">
                    <header className="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center shrink-0">
                        <div>
                            <h1 className="text-xl font-bold">מודול אבחון - גרסה V5</h1>
                            {testState === 'running' && (
                                <div className="mt-2 w-64 h-2 bg-slate-700 rounded overflow-hidden relative">
                                    <div className={`h-full transition-all duration-300 ${memoryUsage > 85 ? 'bg-red-500' : 'bg-green-500'}`} style={{ width: `${memoryUsage}%` }}></div>
                                    <span className="absolute inset-0 flex justify-center items-center text-[10px] drop-shadow-md">שימוש בזיכרון הפעיל (Buffer)</span>
                                </div>
                            )}
                        </div>
                        <div className="flex gap-4 items-center">
                            <button onClick={exportDataToFile} className="px-4 py-2 rounded font-bold text-slate-300 bg-slate-700 hover:bg-slate-600 transition-colors border border-slate-500">
                                💾 ייצא נתונים לקובץ
                            </button>
                            {testState === 'countdown' && <span className="text-yellow-400 font-bold animate-pulse">מתכונן...</span>}
                            {testState === 'running' && <span className="text-red-400 font-bold animate-pulse">הקלטה פעילה</span>}
                            <button onClick={handleTestSequence} className={`px-6 py-2 rounded font-bold text-white transition-colors ${testState === 'running' ? 'bg-red-500 hover:bg-red-600' : testState === 'countdown' ? 'bg-yellow-500 cursor-not-allowed' : 'bg-blue-500 hover:bg-blue-600'}`} disabled={testState === 'countdown'}>
                                {testState === 'running' ? '⏹ עצור הקלטה' : '▶️ התחל מבדק'}
                            </button>
                        </div>
                    </header>

                    <div className="flex gap-4 flex-1 overflow-hidden">
                        <div className="flex-1 flex flex-col gap-4">
                            <div className="flex-1 bg-black rounded-xl border border-slate-700 relative overflow-hidden shadow-inner">
                                {stimulusDisplay.isVisible && (
                                    <div className={`absolute rounded-full shadow-[0_0_20px_rgba(255,255,255,0.4)] transform -translate-x-1/2 -translate-y-1/2 transition-all duration-75 ${testState === 'countdown' ? 'animate-ping' : ''}`}
                                         style={{ left: `${stimulusDisplay.x}%`, top: `${stimulusDisplay.y}%`, width: `${stimulusDisplay.size}px`, height: `${stimulusDisplay.size}px`, backgroundColor: testConfig.color }} />
                                )}
                            </div>

                            <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 grid grid-cols-2 gap-4 shrink-0">
                                <div className="flex flex-col gap-2">
                                    <span className="text-xs text-slate-400">סוג מבדק:</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => setTestConfig({...testConfig, type: 'tracking'})} className={`flex-1 py-1 text-sm rounded ${testConfig.type === 'tracking' ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300'}`}>מעקב תנועה</button>
                                        <button onClick={() => setTestConfig({...testConfig, type: 'convergence'})} className={`flex-1 py-1 text-sm rounded ${testConfig.type === 'convergence' ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300'}`}>התכנסות (NPC)</button>
                                    </div>
                                </div>
                                {testConfig.type === 'tracking' ? (
                                    <div className="flex flex-col gap-2">
                                        <span className="text-xs text-slate-400">כיוון מעקב:</span>
                                        <select value={testConfig.trackVector} onChange={e => setTestConfig({...testConfig, trackVector: e.target.value})} className="bg-slate-700 text-white text-sm p-1 rounded outline-none border border-slate-600">
                                            <option value="horizontal">אופקי</option><option value="vertical">אנכי</option><option value="figure8">שמיניה</option>
                                        </select>
                                    </div>
                                ) : (
                                    <div className="flex flex-col gap-2">
                                        <span className="text-xs text-slate-400">טווח גירוי (NPC):</span>
                                        <div className="flex gap-2 text-xs items-center">
                                            <span>מינ:</span><input type="range" min="10" max="50" value={testConfig.convMinSize} onChange={e => setTestConfig({...testConfig, convMinSize: parseInt(e.target.value)})} className="w-16"/>
                                            <span>מקס:</span><input type="range" min="100" max="300" value={testConfig.convMaxSize} onChange={e => setTestConfig({...testConfig, convMaxSize: parseInt(e.target.value)})} className="w-16"/>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="w-[450px] flex flex-col gap-4 shrink-0 overflow-hidden">
                            <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 grid grid-cols-2 gap-3 shrink-0">
                                <div className="bg-slate-900 p-2 rounded text-center"><div className="text-[10px] text-slate-400">ימין מנורמל (%)</div><div className="text-xl font-mono text-blue-300">{metrics.rightNorm}</div></div>
                                <div className="bg-slate-900 p-2 rounded text-center"><div className="text-[10px] text-slate-400">שמאל מנורמל (%)</div><div className="text-xl font-mono text-blue-300">{metrics.leftNorm}</div></div>
                                <div className="bg-slate-900 p-2 rounded text-center"><div className="text-[10px] text-slate-400">IPD רגעי</div><div className="text-xl font-mono text-white">{metrics.ipd}</div></div>
                                <div className="bg-slate-900 p-2 rounded text-center"><div className="text-[10px] text-slate-400">ריצוד רגעי</div><div className="text-xl font-mono text-red-400">{metrics.jitter}</div></div>
                                <video ref={videoRef} className="hidden" playsInline autoPlay muted /><canvas ref={canvasRef} className="hidden" width="640" height="480" />
                            </div>

                            <div className="flex-1 bg-slate-800 rounded-xl border border-slate-700 p-4 overflow-y-auto">
                                <h2 className="font-bold border-b border-slate-700 pb-2 mb-3">📋 לוג בדיקות (אגור בזיכרון)</h2>
                                <div className="space-y-4">
                                    {runLogs.length === 0 && <div className="text-sm text-slate-500 text-center">בצע בדיקה כדי להציג גרפים.</div>}
                                    {runLogs.map((log, i) => (
                                        <div key={log.id} className="bg-slate-900 border border-slate-600 p-3 rounded-lg">
                                            <div className="flex justify-between items-start mb-2">
                                                <div><div className="font-bold text-sm">הרצה #{runLogs.length - i} - {log.type}</div><div className="text-xs text-slate-400">{log.time} | משך: {log.duration}s</div></div>
                                                <div className="text-xs bg-slate-800 px-2 py-1 rounded">דגימות: {log.data.length}</div>
                                            </div>
                                            <div className="w-full bg-slate-800/50 rounded mt-2"><RunCharts data={log.data} /></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
