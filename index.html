<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת אבחון עיניים - V16 (Advanced Binocular Analysis)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen overflow-hidden">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- קבועים ומשתנים גלובליים ---
        const LEFT_PUPIL = 468; const RIGHT_PUPIL = 473;
        const RIGHT_EYE_INNER = 133; const RIGHT_EYE_OUTER = 33;
        const LEFT_EYE_INNER = 362; const LEFT_EYE_OUTER = 263;
        const RIGHT_EYE_TOP = 159; const RIGHT_EYE_BOTTOM = 145;
        const LEFT_EYE_TOP = 386; const LEFT_EYE_BOTTOM = 374;
        
        const MAX_SAMPLES_PER_RUN = 15000;
        const CREDIT_CARD_WIDTH_MM = 85.6;

        const pDist = (p1, p2, w, h) => Math.sqrt(Math.pow((p1.x - p2.x) * w, 2) + Math.pow((p1.y - p2.y) * h, 2));

        // פונקציות מתמטיות להחלקה ולסטטיסטיקה
        const smoothData = (data, windowSize) => {
            return data.map((_, idx, arr) => {
                const start = Math.max(0, idx - Math.floor(windowSize / 2));
                const end = Math.min(arr.length, idx + Math.floor(windowSize / 2) + 1);
                const slice = arr.slice(start, end);
                return slice.reduce((a, b) => a + b, 0) / slice.length;
            });
        };

        const getStdDev = (array) => {
            if (array.length === 0) return 0;
            const mean = array.reduce((a, b) => a + b) / array.length;
            return Math.sqrt(array.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / array.length);
        };

        // --- רכיב הגרפים (מעודכן ל-2 גרפים) ---
        function RunCharts({ data, testType, isFullscreen = false }) {
            const chart1Ref = useRef(null);
            const chart2Ref = useRef(null);
            const chart1Instance = useRef(null);
            const chart2Instance = useRef(null);

            useEffect(() => {
                if (!chart1Ref.current || !chart2Ref.current || !data || data.length === 0) return;
                
                const ctx1 = chart1Ref.current.getContext('2d');
                const ctx2 = chart2Ref.current.getContext('2d');
                if (chart1Instance.current) chart1Instance.current.destroy();
                if (chart2Instance.current) chart2Instance.current.destroy();

                const windowSize = 30; // גודל חלון ההחלקה כפי שהוגדר בפייתון

                // חילוץ נתונים
                const timeLabels = data.map(d => d.timeOffset.toFixed(1) + 's');
                const rawLeftX = data.map(d => d.leftNormX);
                const rawRightX = data.map(d => d.rightNormX);
                const rawLeftY = data.map(d => d.leftNormY);
                const rawRightY = data.map(d => d.rightNormY);
                const stimulusX = data.map(d => d.stimulus.x);

                // החלקה (Smoothing)
                const smoothLeftX = smoothData(rawLeftX, windowSize);
                const smoothRightX = smoothData(rawRightX, windowSize);
                
                // חישוב Disparity (מרחק אוקלידי)
                const disparities = data.map((d, i) => Math.sqrt(Math.pow(rawRightX[i] - rawLeftX[i], 2) + Math.pow(rawRightY[i] - rawLeftY[i], 2)));
                const smoothDisparity = smoothData(disparities, windowSize);

                // זיהוי חציות אמצע של הגירוי
                const centerCrossings = [];
                for (let i = 1; i < stimulusX.length; i++) {
                    if ((stimulusX[i-1] <= 50 && stimulusX[i] > 50) || (stimulusX[i-1] >= 50 && stimulusX[i] < 50)) {
                        centerCrossings.push(i);
                    }
                }

                // פלאגין להוספת קווים אנכיים
                const verticalLinePlugin = {
                    id: 'verticalLines',
                    afterDraw: (chart) => {
                        const ctx = chart.ctx; const xAxis = chart.scales.x;
                        const topY = chart.chartArea.top; const bottomY = chart.chartArea.bottom;
                        ctx.save();
                        centerCrossings.forEach((idx, iter) => {
                            const xPos = xAxis.getPixelForTick(idx);
                            ctx.beginPath(); ctx.moveTo(xPos, topY); ctx.lineTo(xPos, bottomY);
                            ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.setLineDash([4, 4]); ctx.stroke();
                            if (iter === 0 && isFullscreen) {
                                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
                                ctx.fillText('Center Cross', xPos, topY + 10);
                            }
                        });
                        ctx.restore();
                    }
                };

                // --- גרף 1: מסלולי עיניים X מול הגירוי ---
                chart1Instance.current = new window.Chart(ctx1, {
                    type: 'line',
                    data: {
                        labels: timeLabels,
                        datasets: [
                            { label: 'Left Eye X (Smooth)', data: smoothLeftX, borderColor: '#3b82f6', borderWidth: 2, pointRadius: 0, tension: 0.2 },
                            { label: 'Right Eye X (Smooth)', data: smoothRightX, borderColor: '#ef4444', borderWidth: 2, pointRadius: 0, tension: 0.2 },
                            { label: 'Stimulus X', data: stimulusX, borderColor: 'rgba(156, 163, 175, 0.5)', borderWidth: 2, borderDash: [5, 5], pointRadius: 0, tension: 0 }
                        ]
                    },
                    plugins: [verticalLinePlugin],
                    options: {
                        responsive: true, maintainAspectRatio: false, animation: false, interaction: { mode: 'index', intersect: false },
                        plugins: { legend: { display: isFullscreen, labels: {color: 'white'} } },
                        scales: { x: { display: false }, y: { title: { display: isFullscreen, text: 'X Position (%)', color: 'white' }, ticks: {color: '#94a3b8'} } }
                    }
                });

                // --- גרף 2: פער ומיקוד (Disparity) ---
                chart2Instance.current = new window.Chart(ctx2, {
                    type: 'line',
                    data: { labels: timeLabels, datasets: [{ label: 'Gaze Disparity (Smooth)', data: smoothDisparity, borderColor: '#a855f7', backgroundColor: 'rgba(168, 85, 247, 0.1)', borderWidth: 2, pointRadius: 0, fill: true, tension: 0.2 }] },
                    plugins: [verticalLinePlugin],
                    options: {
                        responsive: true, maintainAspectRatio: false, animation: false, interaction: { mode: 'index', intersect: false },
                        plugins: { legend: { display: isFullscreen, labels: {color: 'white'} } },
                        scales: { x: { ticks: { color: '#94a3b8', maxTicksLimit: isFullscreen ? 20 : 8 } }, y: { title: { display: isFullscreen, text: 'Disparity (Units)', color: 'white' }, ticks: {color: '#94a3b8'}, beginAtZero: true } }
                    }
                });

                return () => { 
                    if (chart1Instance.current) chart1Instance.current.destroy(); 
                    if (chart2Instance.current) chart2Instance.current.destroy(); 
                };
            }, [data, testType, isFullscreen]);

            return (
                <div className="flex flex-col h-full gap-2">
                    <div className="flex-1 relative"><canvas ref={chart1Ref} style={{ width: '100%', height: '100%' }}></canvas></div>
                    <div className="flex-1 relative"><canvas ref={chart2Ref} style={{ width: '100%', height: '100%' }}></canvas></div>
                </div>
            );
        }

        // --- האפליקציה המרכזית ---
        function App() {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const stimulusDivRef = useRef(null);
            const animationLoopRef = useRef(null);
            
            const [appStage, setAppStage] = useState('calibration');
            const [cameraActive, setCameraActive] = useState(false);
            const [testState, setTestState] = useState('idle');
            
            const [calibBoxWidth, setCalibBoxWidth] = useState(100); 
            const [manualDistanceCm, setManualDistanceCm] = useState(48); 
            const [isManualDistance, setIsManualDistance] = useState(false); 
            const [calibData, setCalibData] = useState({ mmPerPx: 1, distanceCm: 50 }); 
            
            const isRecordingRef = useRef(false);
            const runStartTimeRef = useRef(null);
            const currentRunDataRef = useRef([]);
            const currentRunBlinksRef = useRef([]);
            const isBlinkingStateRef = useRef(false);
            
            // שמירת מיקום לנורמליזציה
            const currentStimulusPosRef = useRef({ x: 50, y: 50, size: 40 });

            const [metrics, setMetrics] = useState({ ipdMm: 0, leftNormX: 0, rightNormX: 0, leftNormY: 0, rightNormY: 0, blinkCount: 0 });
            const [testConfig, setTestConfig] = useState({ type: 'tracking', color: '#3b82f6', durationSpeed: 2, trackVector: 'horizontal', acuity: 50, npcSimulateCm: 5 });
            const [calculatedSizeMm, setCalculatedSizeMm] = useState(0);

            const [runLogs, setRunLogs] = useState([]);
            const [fullscreenChartData, setFullscreenChartData] = useState(null);

            useEffect(() => {
                let camera = null; let faceMesh = null;
                const startTracking = async () => {
                    if (!window.FaceMesh) return;
                    faceMesh = new window.FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
                    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
                    faceMesh.onResults(onResults);
                    camera = new window.Camera(videoRef.current, { onFrame: async () => { await faceMesh.send({ image: videoRef.current }); }, width: 640, height: 480 });
                    await camera.start();
                    setCameraActive(true);
                };
                setTimeout(startTracking, 1000);
            }, []);

            const appStageRef = useRef(appStage);
            useEffect(() => { appStageRef.current = appStage; }, [appStage]);

            const getBaseStimulusSizePx = useCallback(() => {
                const distanceMeters = (calibData.distanceCm || 50) / 100;
                const mUnit = distanceMeters * (testConfig.acuity / 20);
                const sizeMm = mUnit * 1.45;
                const sizePx = sizeMm / (calibData.mmPerPx || 1);
                return { sizePx, sizeMm };
            }, [calibData, testConfig.acuity]);

            useEffect(() => {
                const { sizeMm } = getBaseStimulusSizePx();
                setCalculatedSizeMm(sizeMm);
            }, [getBaseStimulusSizePx]);

            const onResults = useCallback((results) => {
                const width = 640; const height = 480;
                if (canvasRef.current && appStageRef.current === 'calibration') {
                    const ctx = canvasRef.current.getContext('2d');
                    ctx.clearRect(0, 0, width, height);
                    ctx.drawImage(results.image, 0, 0, width, height);
                    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                        window.drawConnectors(ctx, results.multiFaceLandmarks[0], window.FACEMESH_TESSELATION, { color: '#C0C0C040', lineWidth: 0.5 });
                        window.drawConnectors(ctx, results.multiFaceLandmarks[0], window.FACEMESH_RIGHT_IRIS, { color: '#FF3030', lineWidth: 2 });
                        window.drawConnectors(ctx, results.multiFaceLandmarks[0], window.FACEMESH_LEFT_IRIS, { color: '#FF3030', lineWidth: 2 });
                    }
                }
                
                if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
                const lm = results.multiFaceLandmarks[0];

                // חישוב ציר X (אופקי)
                const rightNormX = ((lm[RIGHT_PUPIL].x - lm[RIGHT_EYE_INNER].x) / (lm[RIGHT_EYE_OUTER].x - lm[RIGHT_EYE_INNER].x)) * 100;
                const leftNormX = ((lm[LEFT_PUPIL].x - lm[LEFT_EYE_OUTER].x) / (lm[LEFT_EYE_INNER].x - lm[LEFT_EYE_OUTER].x)) * 100;

                // חישוב ציר Y (אנכי)
                const rightNormY = ((lm[RIGHT_PUPIL].y - lm[RIGHT_EYE_TOP].y) / (lm[RIGHT_EYE_BOTTOM].y - lm[RIGHT_EYE_TOP].y)) * 100;
                const leftNormY = ((lm[LEFT_PUPIL].y - lm[LEFT_EYE_TOP].y) / (lm[LEFT_EYE_BOTTOM].y - lm[LEFT_EYE_TOP].y)) * 100;

                const dx = (lm[LEFT_PUPIL].x - lm[RIGHT_PUPIL].x) * width;
                const dy = (lm[LEFT_PUPIL].y - lm[RIGHT_PUPIL].y) * height;
                const ipdPx = Math.sqrt(dx*dx + dy*dy);
                const currentIpdMm = ipdPx * (calibData.mmPerPx || 1);

                // זיהוי מצמוצים
                const rightW = pDist(lm[33], lm[133], width, height);
                const rightH = pDist(lm[159], lm[145], width, height);
                const leftW = pDist(lm[263], lm[362], width, height);
                const leftH = pDist(lm[386], lm[374], width, height);
                const avgEAR = ((rightH / rightW) + (leftH / leftW)) / 2;
                
                let justBlinked = false;
                if (avgEAR < 0.18) {
                    if (!isBlinkingStateRef.current) { isBlinkingStateRef.current = true; justBlinked = true; }
                } else { isBlinkingStateRef.current = false; }

                if (isRecordingRef.current && runStartTimeRef.current) {
                    const timeOffset = (Date.now() - runStartTimeRef.current) / 1000;
                    if (justBlinked) currentRunBlinksRef.current.push(timeOffset);
                    
                    currentRunDataRef.current.push({ 
                        timeOffset, ipd: parseFloat(currentIpdMm.toFixed(1)) || 0, 
                        leftNormX: parseFloat(leftNormX.toFixed(2)) || 0, rightNormX: parseFloat(rightNormX.toFixed(2)) || 0, 
                        leftNormY: parseFloat(leftNormY.toFixed(2)) || 0, rightNormY: parseFloat(rightNormY.toFixed(2)) || 0,
                        blinkStatus: isBlinkingStateRef.current, stimulus: { ...currentStimulusPosRef.current } 
                    });
                    
                    if (currentRunDataRef.current.length >= MAX_SAMPLES_PER_RUN) {
                        if (isRecordingRef.current) { alert("נעצר עקב הגבלת זיכרון."); handleTestSequence(); }
                    }
                }
                
                setMetrics({ 
                    ipdMm: currentIpdMm.toFixed(1), 
                    leftNormX: leftNormX.toFixed(1), rightNormX: rightNormX.toFixed(1), 
                    leftNormY: leftNormY.toFixed(1), rightNormY: rightNormY.toFixed(1), 
                    blinkCount: currentRunBlinksRef.current.length 
                });
            }, [calibData.mmPerPx]);

            useEffect(() => {
                if (testState !== 'running') {
                    if (animationLoopRef.current) cancelAnimationFrame(animationLoopRef.current);
                    return;
                }
                
                const startTime = Date.now();
                const { sizePx: baseSizePx } = getBaseStimulusSizePx();

                const animate = () => {
                    const t = (Date.now() - startTime) / 1000;
                    let x = 50, y = 50, size = baseSizePx;
                    
                    if (testConfig.type === 'tracking') {
                        const waveX = Math.sin(t * testConfig.durationSpeed) * 40;
                        if (testConfig.trackVector === 'horizontal') x = 50 + waveX;
                        if (testConfig.trackVector === 'vertical') y = 50 + waveX;
                        if (testConfig.trackVector === 'figure8') { x = 50 + waveX; y = 50 + Math.sin(t * testConfig.durationSpeed * 2) * 20; }
                    } else {
                        const startDistCm = calibData.distanceCm || 50;
                        const endDistCm = testConfig.npcSimulateCm || 5;
                        const maxScale = startDistCm / endDistCm;
                        const maxSizePx = baseSizePx * maxScale;
                        
                        const scaleCycle = (Math.sin(t * testConfig.durationSpeed) + 1) / 2;
                        size = baseSizePx + scaleCycle * (maxSizePx - baseSizePx);
                    }
                    
                    currentStimulusPosRef.current = { x, y, size };
                    
                    if (stimulusDivRef.current) {
                        stimulusDivRef.current.style.left = `${x}%`;
                        stimulusDivRef.current.style.top = `${y}%`;
                        stimulusDivRef.current.style.width = `${size}px`;
                        stimulusDivRef.current.style.height = `${size}px`;
                    }
                    animationLoopRef.current = requestAnimationFrame(animate);
                };
                animationLoopRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationLoopRef.current);
            }, [testState, testConfig, getBaseStimulusSizePx, calibData.distanceCm]);

            const handleCalibrationDone = () => {
                const mmPerPixelCalculated = CREDIT_CARD_WIDTH_MM / calibBoxWidth;
                setCalibData({ mmPerPx: mmPerPixelCalculated, distanceCm: manualDistanceCm });
                setAppStage('testing');
            };

            const handleTestSequence = () => {
                if (testState === 'idle') {
                    setTestState('countdown');
                    if(stimulusDivRef.current) {
                        const { sizePx } = getBaseStimulusSizePx();
                        stimulusDivRef.current.style.left = '50%'; stimulusDivRef.current.style.top = '50%';
                        stimulusDivRef.current.style.width = `${sizePx}px`; stimulusDivRef.current.style.height = `${sizePx}px`;
                    }
                    setTimeout(() => {
                        currentRunDataRef.current = []; currentRunBlinksRef.current = [];
                        runStartTimeRef.current = Date.now(); isRecordingRef.current = true;
                        setTestState('running');
                    }, 1000);
                } else if (testState === 'running') {
                    isRecordingRef.current = false; setTestState('idle');
                    if(stimulusDivRef.current) { stimulusDivRef.current.style.left = '50%'; stimulusDivRef.current.style.top = '50%'; }
                    
                    const duration = (Date.now() - runStartTimeRef.current) / 1000;
                    const finalData = JSON.parse(JSON.stringify(currentRunDataRef.current));
                    
                    // חישוב סטטיסטיקות בינוקולריות לסיום
                    const leftXRaw = finalData.map(d => d.leftNormX);
                    const rightXRaw = finalData.map(d => d.rightNormX);
                    const disparities = finalData.map(d => Math.sqrt(Math.pow(d.rightNormX - d.leftNormX, 2) + Math.pow(d.rightNormY - d.leftNormY, 2)));
                    
                    const leftStd = getStdDev(leftXRaw);
                    const rightStd = getStdDev(rightXRaw);
                    const meanDisparity = disparities.length ? disparities.reduce((a,b)=>a+b)/disparities.length : 0;

                    const logEntry = {
                        id: Date.now(), time: new Date().toLocaleTimeString(),
                        type: testConfig.type === 'tracking' ? `מעקב (${testConfig.trackVector})` : 'התכנסות (NPC)',
                        color: testConfig.color, duration: duration.toFixed(1), totalBlinks: currentRunBlinksRef.current.length,
                        stats: { leftStd: leftStd.toFixed(2), rightStd: rightStd.toFixed(2), meanDisparity: meanDisparity.toFixed(2) },
                        data: finalData 
                    };
                    setRunLogs(prev => [logEntry, ...prev]);
                    setMetrics(prev => ({...prev, blinkCount: 0})); 
                }
            };

            const exportToCSV = (log) => {
                let csvContent = "\uFEFF"; 
                csvContent += "Time_Seconds,IPD_mm,Left_Eye_X,Left_Eye_Y,Right_Eye_X,Right_Eye_Y,Disparity,Stimulus_X_%,Stimulus_Y_%,Stimulus_Size_px\n";
                
                log.data.forEach(row => {
                    const disp = Math.sqrt(Math.pow(row.rightNormX - row.leftNormX, 2) + Math.pow(row.rightNormY - row.leftNormY, 2)).toFixed(2);
                    csvContent += `${row.timeOffset.toFixed(3)},${row.ipd},${row.leftNormX},${row.leftNormY},${row.rightNormX},${row.rightNormY},${disp},${row.stimulus.x.toFixed(2)},${row.stimulus.y.toFixed(2)},${row.stimulus.size.toFixed(2)}\n`;
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `EyeTest_Binocular_${log.id}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            return (
                <div className="h-full w-full bg-slate-900 text-slate-100 font-sans overflow-hidden flex flex-col">
                    <div className="hidden"><video ref={videoRef} playsInline autoPlay muted /></div>

                    {/* מסך כיול (מוסתר לאחר אישור) */}
                    <div style={{ display: appStage === 'calibration' ? 'flex' : 'none' }} className="flex-col items-center justify-center h-full p-8 text-center relative z-10 w-full">
                        <h1 className="text-4xl font-bold text-white mb-2">כיול קליני משולב</h1>
                        <div className="flex gap-8 items-stretch justify-center w-full max-w-5xl mt-6">
                            <div className="relative w-[500px] h-[375px] bg-black rounded-xl overflow-hidden border-2 border-slate-700 shadow-xl shrink-0">
                                {!cameraActive && <div className="absolute inset-0 flex items-center justify-center text-slate-500">מצלמה בטעינה...</div>}
                                <canvas ref={canvasRef} className="absolute inset-0 w-full h-full transform -scale-x-100" width="640" height="480" />
                                <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 border-4 border-dashed border-blue-500 bg-blue-500/20 transition-all" 
                                     style={{ width: `${calibBoxWidth}px`, height: `${calibBoxWidth * 0.63}px` }}></div>
                            </div>
                            <div className="flex-1 bg-slate-800 p-6 rounded-xl border border-slate-700 flex flex-col justify-center gap-6">
                                <div>
                                    <label className="text-slate-300 font-bold block mb-2 text-sm text-right">1. התאם גודל כרטיס:</label>
                                    <input type="range" min="20" max="350" value={calibBoxWidth} onChange={(e) => {setCalibBoxWidth(parseInt(e.target.value)); if(!isManualDistance) setManualDistanceCm(Math.round(4763 / parseInt(e.target.value)));}} className="w-full accent-blue-500" />
                                </div>
                                <div className="bg-slate-900 p-4 rounded-lg border border-slate-700 text-right">
                                    <label className="text-slate-300 font-bold block mb-2 text-sm text-right">2. מרחק מהמסך (ס"מ):</label>
                                    <input type="number" value={manualDistanceCm} onChange={(e) => {setManualDistanceCm(parseInt(e.target.value)); setIsManualDistance(true);}} className="bg-slate-700 text-white font-mono text-xl p-2 rounded w-24 outline-none focus:border-blue-500 text-center"/>
                                </div>
                                <button onClick={handleCalibrationDone} className="mt-4 bg-green-600 hover:bg-green-500 text-white font-bold text-lg px-6 py-4 rounded-xl shadow-lg">שמור והתחל</button>
                            </div>
                        </div>
                    </div>

                    {/* מסך המבדק */}
                    <div style={{ display: appStage === 'testing' ? 'flex' : 'none' }} className="flex-col h-full gap-4 p-4 relative z-10 w-full">
                        <header className="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center shrink-0 shadow-md">
                            <div><h1 className="text-xl font-bold text-blue-300">אבחון עוקב אופטומטרי - Binocular</h1></div>
                            <div className="flex gap-4 items-center">
                                <button onClick={handleTestSequence} className={`px-8 py-3 rounded-lg font-bold text-white transition-all shadow-lg ${testState === 'running' ? 'bg-red-500 hover:bg-red-600' : testState === 'countdown' ? 'bg-yellow-500' : 'bg-blue-600 hover:bg-blue-500'}`} disabled={testState === 'countdown'}>
                                    {testState === 'running' ? '⏹ עצור מבדק' : '▶️ התחל מבדק'}
                                </button>
                            </div>
                        </header>

                        <div className="flex gap-4 flex-1 overflow-hidden">
                            <div className="flex-1 flex flex-col gap-4">
                                <div className="flex-1 bg-black rounded-xl border-2 border-slate-700 relative overflow-hidden shadow-inner cursor-crosshair">
                                    <div ref={stimulusDivRef} className={`absolute rounded-full border-2 border-white flex items-center justify-center transform -translate-x-1/2 -translate-y-1/2 shadow-[0_0_15px_rgba(255,255,255,0.4)] ${testState === 'countdown' ? 'animate-ping' : ''}`}
                                        style={{ display: 'flex', backgroundColor: testConfig.color, width: '40px', height: '40px', left: '50%', top: '50%' }}>
                                        <span className="text-white font-black drop-shadow-md pointer-events-none font-sans" style={{fontSize: '70%', lineHeight: 1}}>E</span>
                                    </div>
                                </div>

                                {/* פאנל הגדרות */}
                                <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 flex gap-6 shrink-0 shadow-lg">
                                    <div className="flex-[0.8] flex flex-col gap-2 border-l border-slate-700 pl-6">
                                        <span className="text-sm font-bold text-slate-300">סוג מבדק</span>
                                        <div className="flex gap-2">
                                            <button onClick={() => setTestConfig({...testConfig, type: 'tracking'})} className={`flex-1 py-2 text-xs rounded transition-colors ${testConfig.type === 'tracking' ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-400'}`}>מעקב</button>
                                            <button onClick={() => setTestConfig({...testConfig, type: 'convergence'})} className={`flex-1 py-2 text-xs rounded transition-colors ${testConfig.type === 'convergence' ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-400'}`}>התכנסות</button>
                                        </div>
                                    </div>
                                    <div className="flex-[2] flex flex-col gap-3">
                                        <div className="flex gap-6 items-center">
                                            <div className="flex-1 flex flex-col gap-1">
                                                <span className="text-xs text-slate-400">כיוון מעקב:</span>
                                                <select value={testConfig.trackVector} onChange={e => setTestConfig({...testConfig, trackVector: e.target.value})} className="bg-slate-700 text-white text-sm p-1.5 rounded outline-none w-full border border-slate-600">
                                                    <option value="horizontal">אופקי</option><option value="vertical">אנכי</option><option value="figure8">שמיניה</option>
                                                </select>
                                            </div>
                                            <div className="flex flex-col gap-1 px-1 flex-1">
                                                <span className="text-xs text-slate-400">מהירות (Hz): {testConfig.durationSpeed}</span>
                                                <input type="range" min="0.5" max="5" step="0.5" value={testConfig.durationSpeed} onChange={e => setTestConfig({...testConfig, durationSpeed: parseFloat(e.target.value)})} className="w-full accent-blue-500"/>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="w-[450px] flex flex-col gap-4 shrink-0 overflow-hidden">
                                <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 grid grid-cols-2 gap-3 shrink-0 relative shadow-lg">
                                    <div className="bg-slate-900 p-2 rounded text-center border border-slate-700/50"><div className="text-[10px] text-slate-400">ימין X (%)</div><div className="text-2xl font-mono text-blue-400">{metrics.rightNormX}</div></div>
                                    <div className="bg-slate-900 p-2 rounded text-center border border-slate-700/50"><div className="text-[10px] text-slate-400">שמאל X (%)</div><div className="text-2xl font-mono text-blue-400">{metrics.leftNormX}</div></div>
                                    <div className="bg-slate-900 p-2 rounded text-center border border-slate-700/50"><div className="text-[10px] text-slate-400">ימין Y (%)</div><div className="text-2xl font-mono text-white">{metrics.rightNormY}</div></div>
                                    <div className="bg-slate-900 p-2 rounded text-center border border-slate-700/50"><div className="text-[10px] text-slate-400">שמאל Y (%)</div><div className="text-2xl font-mono text-white">{metrics.leftNormY}</div></div>
                                </div>

                                <div className="flex-1 bg-slate-800 rounded-xl border border-slate-700 p-4 overflow-y-auto shadow-lg">
                                    <h2 className="font-bold border-b border-slate-700 pb-2 mb-3 text-slate-200">📋 דוחות בינוקולריים</h2>
                                    <div className="space-y-4">
                                        {runLogs.map((log, i) => (
                                            <div key={log.id} className="bg-slate-900 border border-slate-600 p-3 rounded-lg flex flex-col shadow-md">
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <div className="font-bold text-sm text-blue-200">דוח #{runLogs.length - i} - {log.type}</div>
                                                        <div className="text-xs text-slate-400 mt-1">
                                                            Eye Stability (Std): L: {log.stats.leftStd} | R: {log.stats.rightStd}<br/>
                                                            Mean Disparity: {log.stats.meanDisparity}
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2 flex-col">
                                                        <button onClick={() => exportToCSV(log)} className="bg-green-700 hover:bg-green-600 text-white text-[10px] px-2 py-1 rounded border border-green-500 font-bold">CSV</button>
                                                        <button onClick={() => setFullscreenChartData(log)} className="bg-slate-700 hover:bg-slate-600 text-white text-[10px] px-2 py-1 rounded border border-slate-500">הגדל</button>
                                                    </div>
                                                </div>
                                                <div className="h-[200px] w-full bg-black/40 rounded mt-1 border border-slate-700 p-1">
                                                    <RunCharts data={log.data} testType={log.type} isFullscreen={false} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {fullscreenChartData && (
                        <div className="fixed inset-0 z-50 bg-slate-900/95 flex flex-col p-8 backdrop-blur-md">
                            <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                                <div>
                                    <h2 className="text-3xl font-bold text-white mb-2">Binocular Analysis (High-Res)</h2>
                                    <div className="flex gap-4 text-sm bg-slate-800 p-2 rounded">
                                        <span className="text-slate-300">Left Stability: <strong className="text-blue-400">{fullscreenChartData.stats.leftStd}</strong></span>
                                        <span className="text-slate-300">Right Stability: <strong className="text-red-400">{fullscreenChartData.stats.rightStd}</strong></span>
                                        <span className="text-slate-300">Mean Disparity: <strong className="text-purple-400">{fullscreenChartData.stats.meanDisparity}</strong></span>
                                    </div>
                                </div>
                                <button onClick={() => setFullscreenChartData(null)} className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg">סגור ✖</button>
                            </div>
                            <div className="flex-1 bg-black/50 rounded-2xl border border-slate-700 p-6 flex flex-col">
                                <RunCharts data={fullscreenChartData.data} testType={fullscreenChartData.type} isFullscreen={true} />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
