<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת אבחון עיניים - V7 (Calibration, Smooth Pursuit & Memory Optimized)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen overflow-hidden">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const LEFT_PUPIL = 468; const RIGHT_PUPIL = 473;
        const RIGHT_EYE_INNER = 133; const RIGHT_EYE_OUTER = 33;
        const LEFT_EYE_INNER = 362; const LEFT_EYE_OUTER = 263;
        const RIGHT_EYE_TOP = 159; const RIGHT_EYE_BOTTOM = 145;
        const LEFT_EYE_TOP = 386; const LEFT_EYE_BOTTOM = 374;
        const MAX_SAMPLES_PER_RUN = 15000;
        
        // כרטיס אשראי סטנדרטי הוא 85.6 מילימטר רוחב
        const CREDIT_CARD_WIDTH_MM = 85.6;

        // --- פלאגין גרפים וסימונים (כפי שהיה בגרסה קודמת) ---
        function RunCharts({ data, testType, isFullscreen = false }) {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!chartRef.current || !data || data.length === 0) return;
                const ctx = chartRef.current.getContext('2d');
                if (chartInstance.current) chartInstance.current.destroy();

                const eventData = new Array(data.length).fill(null);
                let lastBreakIndex = -100;

                for (let i = 1; i < data.length - 1; i++) {
                    const prev = data[i - 1].stimulus; const curr = data[i].stimulus; const next = data[i + 1].stimulus;
                    if ((prev.x < 50 && curr.x >= 50) || (prev.x > 50 && curr.x <= 50) || (prev.y < 50 && curr.y >= 50) || (prev.y > 50 && curr.y <= 50)) {
                        eventData[i] = { type: 'midline', color: 'rgba(156, 163, 175, 0.4)', dash: [5, 5], width: 1 };
                    }
                    const dx1 = curr.x - prev.x; const dx2 = next.x - curr.x;
                    const dy1 = curr.y - prev.y; const dy2 = next.y - curr.y;
                    if ((dx1 * dx2 < 0) || (dy1 * dy2 < 0)) {
                        eventData[i] = { type: 'direction', color: 'rgba(234, 179, 8, 0.6)', dash: [2, 2], width: 1 };
                    }
                    if (testType === 'התכנסות (NPC)') {
                        const ipdJump = data[i].ipd - data[i - 1].ipd;
                        if ((ipdJump > 1.5 || data[i].jitterAvg > 2.0) && (i - lastBreakIndex > 40)) {
                            eventData[i] = { type: 'break', color: 'rgba(239, 68, 68, 0.9)', dash: [], width: 2 };
                            lastBreakIndex = i;
                        }
                    }
                }

                const verticalLinesPlugin = {
                    id: 'verticalEventLines',
                    afterDraw: (chart) => {
                        const ctx = chart.ctx; const xAxis = chart.scales.x;
                        const topY = chart.chartArea.top; const bottomY = chart.chartArea.bottom;
                        eventData.forEach((event, index) => {
                            if (event) {
                                const xPos = xAxis.getPixelForTick(index);
                                ctx.save(); ctx.beginPath(); ctx.moveTo(xPos, topY); ctx.lineTo(xPos, bottomY);
                                ctx.lineWidth = event.width; ctx.strokeStyle = event.color;
                                if (event.dash.length > 0) ctx.setLineDash(event.dash);
                                ctx.stroke(); ctx.restore();
                            }
                        });
                    }
                };

                const labels = data.map(d => d.timeOffset.toFixed(1) + 's');
                const ipdData = data.map(d => d.ipd);
                const jitterData = data.map(d => d.jitterAvg);

                chartInstance.current = new window.Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'IPD (מ"מ)', data: ipdData, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 2, yAxisID: 'y', pointRadius: 0, tension: 0.3 },
                            { label: 'ריצוד (%)', data: jitterData, borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', borderWidth: 1, yAxisID: 'y1', pointRadius: 0, fill: true, tension: 0.2 }
                        ]
                    },
                    plugins: [verticalLinesPlugin],
                    options: {
                        responsive: true, maintainAspectRatio: false, animation: false, interaction: { mode: 'index', intersect: false },
                        plugins: { legend: { display: isFullscreen } },
                        scales: {
                            x: { ticks: { color: '#94a3b8', maxTicksLimit: isFullscreen ? 20 : 8 } },
                            y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'IPD (mm)', color: '#3b82f6' } },
                            y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Jitter (%)', color: '#ef4444' }, grid: { drawOnChartArea: false }, min: 0 }
                        }
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [data, testType, isFullscreen]);

            return (
                <div className="flex flex-col h-full">
                    <div className="flex-1 relative"><canvas ref={chartRef} style={{ width: '100%', height: '100%' }}></canvas></div>
                    <div className={`flex flex-wrap gap-3 mt-2 text-xs justify-center ${isFullscreen ? 'text-sm' : ''}`}>
                        <span className="text-slate-400 border-b border-dashed border-slate-400">חציית אמצע</span>
                        <span className="text-yellow-500 border-b border-dashed border-yellow-500">שינוי כיוון</span>
                        {testType === 'התכנסות (NPC)' && <span className="text-red-500 border-b-2 border-red-500 font-bold">שבירת התכנסות</span>}
                    </div>
                </div>
            );
        }

        // --- האפליקציה המרכזית ---
        function App() {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            
            // Ref ישיר לגירוי על מנת למנוע קפיצות רינדור של React (Smooth Animation)
            const stimulusDivRef = useRef(null);
            const animationLoopRef = useRef(null);
            
            // State Management
            const [appStage, setAppStage] = useState('calibration'); // calibration | testing
            const [cameraActive, setCameraActive] = useState(false);
            const [testState, setTestState] = useState('idle');
            
            // Calibration Data
            const [calibData, setCalibData] = useState({ mmPerPx: 1, screenW: 0, screenH: 0, distanceCm: 0 });
            
            const isRecordingRef = useRef(false);
            const runStartTimeRef = useRef(null);
            const currentRunDataRef = useRef([]);
            const currentRunBlinksRef = useRef([]);
            const isBlinkingStateRef = useRef(false);
            const lastNormPosRef = useRef({ left: 50, right: 50 });
            
            // שמירת המיקום הרגעי של הגירוי לצורך הלוג (מתעדכן ללא React State)
            const currentStimulusPosRef = useRef({ x: 50, y: 50, size: 40 });

            const [metrics, setMetrics] = useState({ ipdPx: 0, ipdMm: 0, leftNorm: 0, rightNorm: 0, jitter: 0 });
            const [testConfig, setTestConfig] = useState({ type: 'tracking', color: '#3b82f6', durationSpeed: 2, trackVector: 'horizontal', convMinSize: 20, convMaxSize: 150 });
            const [runLogs, setRunLogs] = useState([]);
            const [fullscreenChartData, setFullscreenChartData] = useState(null);

            // הפעלת מצלמה (MediaPipe) - רץ ברקע לכל אורך חיי האפליקציה
            useEffect(() => {
                let camera = null; let faceMesh = null;
                const startTracking = async () => {
                    if (!window.FaceMesh) return;
                    faceMesh = new window.FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
                    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
                    faceMesh.onResults(onResults);
                    camera = new window.Camera(videoRef.current, { onFrame: async () => { await faceMesh.send({ image: videoRef.current }); }, width: 640, height: 480 });
                    await camera.start();
                    setCameraActive(true);
                };
                setTimeout(startTracking, 1000);
            }, []);

            const onResults = useCallback((results) => {
                const width = 640; const height = 480;
                
                // ציור וידאו ופנים *רק* בשלב הכיול! בשלב הבדיקה אנחנו חוסכים בזיכרון ועיבוד GPU
                if (canvasRef.current) {
                    const ctx = canvasRef.current.getContext('2d');
                    ctx.clearRect(0, 0, width, height);
                    if (appStage === 'calibration') {
                        ctx.drawImage(results.image, 0, 0, width, height);
                        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                            window.drawConnectors(ctx, results.multiFaceLandmarks[0], window.FACEMESH_TESSELATION, { color: '#C0C0C040', lineWidth: 0.5 });
                            window.drawConnectors(ctx, results.multiFaceLandmarks[0], window.FACEMESH_RIGHT_IRIS, { color: '#FF3030', lineWidth: 2 });
                            window.drawConnectors(ctx, results.multiFaceLandmarks[0], window.FACEMESH_LEFT_IRIS, { color: '#FF3030', lineWidth: 2 });
                        }
                    }
                }
                
                if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
                const lm = results.multiFaceLandmarks[0];

                const rightInnerX = lm[RIGHT_EYE_INNER].x; const rightOuterX = lm[RIGHT_EYE_OUTER].x;
                const leftInnerX = lm[LEFT_EYE_INNER].x; const leftOuterX = lm[LEFT_EYE_OUTER].x;
                const rightPupilX = lm[RIGHT_PUPIL].x; const rightPupilY = lm[RIGHT_PUPIL].y;
                const leftPupilX = lm[LEFT_PUPIL].x; const leftPupilY = lm[LEFT_PUPIL].y;

                const rightNorm = ((rightPupilX - rightInnerX) / (rightOuterX - rightInnerX)) * 100;
                const leftNorm = ((leftPupilX - leftOuterX) / (leftInnerX - leftOuterX)) * 100;

                const deltaLeft = Math.abs(leftNorm - lastNormPosRef.current.left);
                const deltaRight = Math.abs(rightNorm - lastNormPosRef.current.right);
                const currentJitter = (deltaLeft + deltaRight) / 2;
                lastNormPosRef.current = { left: leftNorm, right: rightNorm };

                const dx = (leftPupilX - rightPupilX) * width;
                const dy = (leftPupilY - rightPupilY) * height;
                const ipdPx = Math.sqrt(dx*dx + dy*dy);
                // המרה למילימטרים (אם עדיין לא כויל, יוכפל ב-1)
                const currentIpdMm = ipdPx * calibData.mmPerPx;

                const rightEyeH = Math.abs(lm[RIGHT_EYE_TOP].y - lm[RIGHT_EYE_BOTTOM].y);
                const leftEyeH = Math.abs(lm[LEFT_EYE_TOP].y - lm[LEFT_EYE_BOTTOM].y);
                let justBlinked = false;
                if ((rightEyeH + leftEyeH)/2 < 0.025) {
                    if (!isBlinkingStateRef.current) { isBlinkingStateRef.current = true; justBlinked = true; }
                } else { isBlinkingStateRef.current = false; }

                if (isRecordingRef.current && runStartTimeRef.current) {
                    const timeOffset = (Date.now() - runStartTimeRef.current) / 1000;
                    if (justBlinked) currentRunBlinksRef.current.push(timeOffset);
                    
                    currentRunDataRef.current.push({ 
                        timeOffset, 
                        ipd: parseFloat(currentIpdMm.toFixed(1)), 
                        leftNorm: parseFloat(leftNorm.toFixed(1)), 
                        rightNorm: parseFloat(rightNorm.toFixed(1)), 
                        jitterAvg: parseFloat(currentJitter.toFixed(2)),
                        blinkStatus: isBlinkingStateRef.current, 
                        stimulus: { ...currentStimulusPosRef.current } 
                    });

                    if (currentRunDataRef.current.length >= MAX_SAMPLES_PER_RUN) {
                        if (isRecordingRef.current) { alert("נעצר עקב הגבלת זיכרון. נשמר."); handleTestSequence(); }
                    }
                }

                // העברת הנתונים לממשק לתצוגה
                setMetrics({ 
                    ipdPx: ipdPx.toFixed(1), 
                    ipdMm: currentIpdMm.toFixed(1), 
                    leftNorm: leftNorm.toFixed(1), 
                    rightNorm: rightNorm.toFixed(1), 
                    jitter: currentJitter.toFixed(2) 
                });

            }, [appStage, calibData.mmPerPx]);

            // --- מנוע האנימציה (Smooth DOM Animation ללא רינדור React) ---
            useEffect(() => {
                if (testState !== 'running') {
                    if (animationLoopRef.current) cancelAnimationFrame(animationLoopRef.current);
                    return;
                }
                
                const startTime = Date.now();
                const animate = () => {
                    const t = (Date.now() - startTime) / 1000;
                    let x = 50, y = 50, size = 40;
                    
                    if (testConfig.type === 'tracking') {
                        const waveX = Math.sin(t * testConfig.durationSpeed) * 40;
                        if (testConfig.trackVector === 'horizontal') x = 50 + waveX;
                        if (testConfig.trackVector === 'vertical') y = 50 + waveX;
                        if (testConfig.trackVector === 'figure8') { x = 50 + waveX; y = 50 + Math.sin(t * testConfig.durationSpeed * 2) * 20; }
                    } else {
                        const scaleCycle = (Math.sin(t * testConfig.durationSpeed) + 1) / 2;
                        size = testConfig.convMinSize + (scaleCycle * (testConfig.convMaxSize - testConfig.convMinSize));
                    }
                    
                    // עדכון Ref של הלוג (עבור OpenCV)
                    currentStimulusPosRef.current = { x, y, size };
                    
                    // עדכון ישיר של ה-DOM לאנימציה חלקה ללא קפיצות!
                    if (stimulusDivRef.current) {
                        stimulusDivRef.current.style.left = `${x}%`;
                        stimulusDivRef.current.style.top = `${y}%`;
                        stimulusDivRef.current.style.width = `${size}px`;
                        stimulusDivRef.current.style.height = `${size}px`;
                    }
                    
                    animationLoopRef.current = requestAnimationFrame(animate);
                };
                animationLoopRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationLoopRef.current);
            }, [testState, testConfig]);

            // פונקציית סיום כיול ומעבר לבדיקה
            const handleCalibrationDone = () => {
                // המלבן שמוצג למשתמש הוא ברוחב 250 פיקסלים.
                // המשתמש קירב את הכרטיס (85.6mm) כך שיתאים למלבן.
                const pixelsForCard = 250; 
                const mmPerPixelCalculated = CREDIT_CARD_WIDTH_MM / pixelsForCard;
                
                // חישוב מרחק משוער: FOV ממוצע של מצלמה הוא ~60 מעלות. אומדן מרחק מהמסך:
                const estimatedDistCm = ((15000 / metrics.ipdPx) * 1.2).toFixed(0); 

                setCalibData({
                    mmPerPx: mmPerPixelCalculated,
                    screenW: window.screen.width,
                    screenH: window.screen.height,
                    distanceCm: estimatedDistCm
                });
                
                setAppStage('testing');
            };

            const handleTestSequence = () => {
                if (testState === 'idle') {
                    setTestState('countdown');
                    // מיקום התחלתי לפני ההקלטה
                    if(stimulusDivRef.current) {
                        stimulusDivRef.current.style.left = '50%'; stimulusDivRef.current.style.top = '50%';
                        stimulusDivRef.current.style.width = testConfig.type === 'convergence' ? `${testConfig.convMinSize}px` : '40px';
                    }
                    setTimeout(() => {
                        currentRunDataRef.current = []; currentRunBlinksRef.current = [];
                        runStartTimeRef.current = Date.now(); isRecordingRef.current = true;
                        setTestState('running');
                    }, 1000);
                } else if (testState === 'running') {
                    isRecordingRef.current = false; setTestState('idle');
                    if(stimulusDivRef.current) { stimulusDivRef.current.style.left = '50%'; stimulusDivRef.current.style.top = '50%'; }
                    
                    const duration = (Date.now() - runStartTimeRef.current) / 1000;
                    const logEntry = {
                        id: Date.now(), time: new Date().toLocaleTimeString(),
                        type: testConfig.type === 'tracking' ? `מעקב (${testConfig.trackVector})` : 'התכנסות (NPC)',
                        color: testConfig.color, duration: duration.toFixed(1), totalBlinks: currentRunBlinksRef.current.length,
                        data: [...currentRunDataRef.current] 
                    };
                    setRunLogs(prev => [logEntry, ...prev]);
                }
            };

            // ---- מסך הכיול (Calibration UI) ----
            if (appStage === 'calibration') {
                return (
                    <div className="flex flex-col items-center justify-center h-full bg-slate-900 p-8 text-center relative z-10">
                        <h1 className="text-4xl font-bold text-white mb-4">כיול מצלמה ומרחק</h1>
                        <p className="text-slate-300 mb-8 max-w-2xl text-lg">
                            אנא החזק כרטיס מגנטי סטנדרטי (אשראי, רב-קו וכדומה) לצד העין שלך.<br/>
                            התקרב או התרחק מהמצלמה עד שרוחב הכרטיס במציאות יחפוף בדיוק לרוחב המלבן הכחול על המסך.
                        </p>
                        
                        <div className="relative w-[640px] h-[480px] bg-black rounded-xl overflow-hidden border-4 border-slate-700 shadow-2xl">
                            {!cameraActive && <div className="absolute inset-0 flex items-center justify-center text-slate-500">טוען מצלמה...</div>}
                            <video ref={videoRef} className="hidden" playsInline autoPlay muted />
                            <canvas ref={canvasRef} className="absolute inset-0 w-full h-full transform -scale-x-100" width="640" height="480" />
                            
                            {/* Overlay של הכרטיס לכיול */}
                            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 border-4 border-dashed border-blue-500 bg-blue-500/20 pointer-events-none flex items-center justify-center" 
                                 style={{ width: '250px', height: '158px' }}>
                                <span className="text-blue-200 font-bold drop-shadow-md text-sm bg-black/50 px-2 rounded">התאם כרטיס למלבן זה</span>
                            </div>
                        </div>

                        <div className="mt-8 flex gap-6 items-center">
                            <div className="text-right bg-slate-800 p-4 rounded-lg border border-slate-700">
                                <div className="text-sm text-slate-400">זיהוי מסך:</div>
                                <div className="text-xl text-white font-mono" dir="ltr">{window.screen.width} x {window.screen.height} px</div>
                            </div>
                            <button onClick={handleCalibrationDone} className="bg-green-600 hover:bg-green-500 text-white font-bold text-xl px-10 py-4 rounded-xl shadow-[0_0_20px_rgba(34,197,94,0.4)] transition-transform hover:scale-105">
                                ✔ השלם כיול והמשך למבדק
                            </button>
                        </div>
                    </div>
                );
            }

            // ---- מסך המבדק (Testing UI) ----
            return (
                <div className="flex flex-col h-full gap-4 p-4 relative z-10">
                    <header className="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center shrink-0">
                        <div>
                            <h1 className="text-xl font-bold">מודול אבחון עוקב (מכויל - רץ במילימטרים)</h1>
                            <div className="text-xs text-slate-400 mt-1 flex gap-4">
                                <span>רזולוציה: <span dir="ltr">{calibData.screenW}x{calibData.screenH}</span></span>
                                <span>| מרחק מוערך: {calibData.distanceCm} ס"מ</span>
                                <span>| 1 מ"מ = {(1/calibData.mmPerPx).toFixed(1)} פיקסלים</span>
                            </div>
                        </div>
                        <div className="flex gap-4 items-center">
                            {testState === 'countdown' && <span className="text-yellow-400 font-bold animate-pulse">הכן את הנבדק...</span>}
                            {testState === 'running' && <span className="text-red-400 font-bold animate-pulse">⏺ הקלטה פעילה</span>}
                            <button onClick={handleTestSequence} className={`px-8 py-3 rounded-lg font-bold text-white transition-all shadow-lg ${testState === 'running' ? 'bg-red-500 hover:bg-red-600 hover:shadow-red-500/30' : testState === 'countdown' ? 'bg-yellow-500 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-500 hover:shadow-blue-500/30'}`} disabled={testState === 'countdown'}>
                                {testState === 'running' ? '⏹ עצור הקלטה' : '▶️ התחל מבדק'}
                            </button>
                        </div>
                    </header>

                    <div className="flex gap-4 flex-1 overflow-hidden">
                        {/* חצי ימין: מסך גירוי ובקרים */}
                        <div className="flex-1 flex flex-col gap-4">
                            {/* אזור הגירוי - הוידאו סגור כדי לחסוך זכרון! */}
                            <div className="flex-1 bg-black rounded-xl border-2 border-slate-700 relative overflow-hidden shadow-inner cursor-crosshair">
                                
                                {/* הגירוי - רץ עם DOM Ref ישיר ללא רינדור React = תנועה חלקה ורציפה */}
                                <div 
                                    ref={stimulusDivRef}
                                    className={`absolute rounded-full border-4 border-white flex items-center justify-center transform -translate-x-1/2 -translate-y-1/2 shadow-[0_0_25px_rgba(255,255,255,0.5)] ${testState === 'countdown' ? 'animate-ping' : ''}`}
                                    style={{ 
                                        display: testState === 'idle' ? 'none' : 'flex',
                                        backgroundColor: testConfig.color,
                                        width: '40px', height: '40px', left: '50%', top: '50%'
                                    }}
                                >
                                    {/* סימן ה-X בתוך הגירוי */}
                                    <span className="text-white font-black drop-shadow-md pointer-events-none" style={{fontSize: 'calc(50%)'}}>X</span>
                                </div>
                            </div>

                            {/* בקרי שליטה למאבחן */}
                            <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 flex gap-6 shrink-0 shadow-lg">
                                <div className="flex-1 flex flex-col gap-2 border-l border-slate-700 pl-6">
                                    <span className="text-sm font-bold text-slate-300">סוג מבדק</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => setTestConfig({...testConfig, type: 'tracking'})} className={`flex-1 py-2 text-sm rounded transition-colors ${testConfig.type === 'tracking' ? 'bg-blue-600 text-white font-bold' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}>מעקב (Pursuit)</button>
                                        <button onClick={() => setTestConfig({...testConfig, type: 'convergence'})} className={`flex-1 py-2 text-sm rounded transition-colors ${testConfig.type === 'convergence' ? 'bg-blue-600 text-white font-bold' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}>התכנסות (NPC)</button>
                                    </div>
                                </div>

                                <div className="flex-[2] flex flex-col gap-2">
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-sm font-bold text-slate-300">פרמטרים</span>
                                        <div className="flex gap-1">
                                            {['#3b82f6', '#ef4444', '#22c55e', '#eab308'].map(c => (
                                                <button key={c} onClick={() => setTestConfig({...testConfig, color: c})} className={`w-5 h-5 rounded-full border-2 ${testConfig.color === c ? 'border-white' : 'border-transparent'}`} style={{backgroundColor: c}} />
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {testConfig.type === 'tracking' ? (
                                        <div className="flex gap-6">
                                            <div className="flex-1 flex flex-col gap-1">
                                                <span className="text-xs text-slate-400">כיוון:</span>
                                                <select value={testConfig.trackVector} onChange={e => setTestConfig({...testConfig, trackVector: e.target.value})} className="bg-slate-700 text-white text-sm p-1.5 rounded outline-none w-full">
                                                    <option value="horizontal">אופקי (ימינה/שמאלה)</option><option value="vertical">אנכי (מעלה/מטה)</option><option value="figure8">שמיניה (Lissajous)</option>
                                                </select>
                                            </div>
                                            <div className="flex-1 flex flex-col gap-1">
                                                <span className="text-xs text-slate-400 flex justify-between"><span>מהירות תנועה:</span> <span>{testConfig.durationSpeed}</span></span>
                                                <input type="range" min="0.5" max="5" step="0.5" value={testConfig.durationSpeed} onChange={e => setTestConfig({...testConfig, durationSpeed: parseFloat(e.target.value)})} className="accent-blue-500 mt-1"/>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex gap-6 items-center">
                                            <div className="flex-1 flex flex-col gap-1">
                                                <span className="text-xs text-slate-400">טווח שינוי גודל (מינימום - מקסימום):</span>
                                                <div className="flex gap-2 items-center">
                                                    <input type="range" min="10" max="60" value={testConfig.convMinSize} onChange={e => setTestConfig({...testConfig, convMinSize: parseInt(e.target.value)})} className="w-20 accent-blue-500"/>
                                                    <span className="text-slate-500 text-xs">עד</span>
                                                    <input type="range" min="80" max="400" value={testConfig.convMaxSize} onChange={e => setTestConfig({...testConfig, convMaxSize: parseInt(e.target.value)})} className="w-20 accent-blue-500"/>
                                                </div>
                                            </div>
                                            <div className="flex-1 flex flex-col gap-1">
                                                <span className="text-xs text-slate-400">קצב התקרבות:</span>
                                                <input type="range" min="0.5" max="3" step="0.5" value={testConfig.durationSpeed} onChange={e => setTestConfig({...testConfig, durationSpeed: parseFloat(e.target.value)})} className="accent-blue-500"/>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* חצי שמאל: נתונים ולוגים */}
                        <div className="w-[450px] flex flex-col gap-4 shrink-0 overflow-hidden">
                            <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 grid grid-cols-2 gap-3 shrink-0 relative shadow-lg">
                                {/* חיווי מצלמה שקוף ברקע כדי להראות שזה עובד למרות שאין וידאו */}
                                <div className="absolute top-2 right-2 flex items-center gap-1 bg-black/40 px-2 py-1 rounded text-[10px] text-green-400 border border-green-500/30">
                                    <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> חיישן עוקב
                                </div>
                                
                                <div className="bg-slate-900 p-2 rounded text-center border border-slate-700/50"><div className="text-[10px] text-slate-400">אישון ימין (פנימי %)</div><div className="text-2xl font-mono text-blue-400">{metrics.rightNorm}</div></div>
                                <div className="bg-slate-900 p-2 rounded text-center border border-slate-700/50"><div className="text-[10px] text-slate-400">אישון שמאל (פנימי %)</div><div className="text-2xl font-mono text-blue-400">{metrics.leftNorm}</div></div>
                                <div className="bg-slate-900 p-2 rounded text-center border border-slate-700/50"><div className="text-[10px] text-slate-400">IPD רגעי (במ"מ)</div><div className="text-2xl font-mono text-white">{metrics.ipdMm} <span className="text-xs text-slate-500">mm</span></div></div>
                                <div className="bg-slate-900 p-2 rounded text-center border border-slate-700/50"><div className="text-[10px] text-slate-400">ריצוד רגעי (Jitter)</div><div className="text-2xl font-mono text-red-400">{metrics.jitter} <span className="text-xs text-slate-500">%</span></div></div>
                            </div>

                            <div className="flex-1 bg-slate-800 rounded-xl border border-slate-700 p-4 overflow-y-auto shadow-lg">
                                <h2 className="font-bold border-b border-slate-700 pb-2 mb-3 text-slate-200">📋 דוחות קליניים</h2>
                                <div className="space-y-4">
                                    {runLogs.map((log, i) => (
                                        <div key={log.id} className="bg-slate-900 border border-slate-600 p-3 rounded-lg flex flex-col shadow-md">
                                            <div className="flex justify-between items-start mb-2">
                                                <div><div className="font-bold text-sm text-blue-200">דוח #{runLogs.length - i} - {log.type}</div><div className="text-xs text-slate-400">{log.time} | משך: {log.duration}s</div></div>
                                                <button onClick={() => setFullscreenChartData(log)} className="bg-slate-700 hover:bg-slate-600 text-white text-xs px-3 py-1.5 rounded transition-colors border border-slate-500 flex items-center gap-1">🔍 הגדל</button>
                                            </div>
                                            <div className="h-[180px] w-full bg-black/40 rounded mt-1 border border-slate-700 p-1">
                                                <RunCharts data={log.data} testType={log.type} isFullscreen={false} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* מודאל הגדלת גרף */}
                    {fullscreenChartData && (
                        <div className="fixed inset-0 z-50 bg-slate-900/95 flex flex-col p-8 backdrop-blur-md">
                            <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                                <div>
                                    <h2 className="text-3xl font-bold text-white mb-2">ניתוח גרפי מתקדם</h2>
                                    <p className="text-slate-400 text-sm">
                                        סוג בדיקה: <strong className="text-white">{fullscreenChartData.type}</strong> | 
                                        זמן בדיקה: <strong className="text-white">{fullscreenChartData.duration} שניות</strong> | 
                                        מצמוצים שנרשמו: <strong className="text-yellow-400">{fullscreenChartData.totalBlinks}</strong>
                                    </p>
                                </div>
                                <button onClick={() => setFullscreenChartData(null)} className="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg flex items-center gap-2">
                                    חזור למסך הראשי ✖
                                </button>
                            </div>
                            <div className="flex-1 bg-black/50 rounded-2xl border border-slate-700 p-6 shadow-inner flex flex-col">
                                <RunCharts data={fullscreenChartData.data} testType={fullscreenChartData.type} isFullscreen={true} />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
