<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת אבחון עיניים - V10 (Live Optotype & Manual Distance)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen overflow-hidden">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const LEFT_PUPIL = 468; const RIGHT_PUPIL = 473;
        const RIGHT_EYE_INNER = 133; const RIGHT_EYE_OUTER = 33;
        const LEFT_EYE_INNER = 362; const LEFT_EYE_OUTER = 263;
        const RIGHT_EYE_TOP = 159; const RIGHT_EYE_BOTTOM = 145;
        const LEFT_EYE_TOP = 386; const LEFT_EYE_BOTTOM = 374;
        const MAX_SAMPLES_PER_RUN = 15000;
        
        const CREDIT_CARD_WIDTH_MM = 85.6;

        // --- רכיב הגרפים ---
        function RunCharts({ data, testType, isFullscreen = false }) {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!chartRef.current || !data || data.length === 0) return;
                const ctx = chartRef.current.getContext('2d');
                if (chartInstance.current) chartInstance.current.destroy();

                const eventData = new Array(data.length).fill(null);
                let lastBreakIndex = -100;

                try {
                    for (let i = 1; i < data.length - 1; i++) {
                        const prev = data[i - 1]?.stimulus; const curr = data[i]?.stimulus; const next = data[i + 1]?.stimulus;
                        if (!prev || !curr || !next) continue;

                        if ((prev.x < 50 && curr.x >= 50) || (prev.x > 50 && curr.x <= 50) || (prev.y < 50 && curr.y >= 50) || (prev.y > 50 && curr.y <= 50)) {
                            eventData[i] = { type: 'midline', color: 'rgba(156, 163, 175, 0.4)', dash: [5, 5], width: 1 };
                        }
                        const dx1 = curr.x - prev.x; const dx2 = next.x - curr.x;
                        const dy1 = curr.y - prev.y; const dy2 = next.y - curr.y;
                        if ((dx1 * dx2 < 0) || (dy1 * dy2 < 0)) {
                            eventData[i] = { type: 'direction', color: 'rgba(234, 179, 8, 0.6)', dash: [2, 2], width: 1 };
                        }
                        if (testType === 'התכנסות (NPC)') {
                            const ipdJump = (data[i].ipd || 0) - (data[i - 1].ipd || 0);
                            if ((ipdJump > 1.5 || (data[i].jitterAvg || 0) > 2.0) && (i - lastBreakIndex > 40)) {
                                eventData[i] = { type: 'break', color: 'rgba(239, 68, 68, 0.9)', dash: [], width: 2 };
                                lastBreakIndex = i;
                            }
                        }
                    }
                } catch (e) { console.error("שגיאה בחישוב אירועי גרף", e); }

                const verticalLinesPlugin = {
                    id: 'verticalEventLines',
                    afterDraw: (chart) => {
                        const ctx = chart.ctx; const xAxis = chart.scales.x;
                        const topY = chart.chartArea.top; const bottomY = chart.chartArea.bottom;
                        eventData.forEach((event, index) => {
                            if (event) {
                                const xPos = xAxis.getPixelForTick(index);
                                ctx.save(); ctx.beginPath(); ctx.moveTo(xPos, topY); ctx.lineTo(xPos, bottomY);
                                ctx.lineWidth = event.width; ctx.strokeStyle = event.color;
                                if (event.dash.length > 0) ctx.setLineDash(event.dash);
                                ctx.stroke(); ctx.restore();
                            }
                        });
                    }
                };

                const labels = data.map(d => d.timeOffset.toFixed(1) + 's');
                const ipdData = data.map(d => d.ipd || 0);
                const jitterData = data.map(d => d.jitterAvg || 0);

                chartInstance.current = new window.Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'IPD (מ"מ)', data: ipdData, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 2, yAxisID: 'y', pointRadius: 0, tension: 0.3 },
                            { label: 'ריצוד (%)', data: jitterData, borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', borderWidth: 1, yAxisID: 'y1', pointRadius: 0, fill: true, tension: 0.2 }
                        ]
                    },
                    plugins: [verticalLinesPlugin],
                    options: {
                        responsive: true, maintainAspectRatio: false, animation: false, interaction: { mode: 'index', intersect: false },
                        plugins: { legend: { display: isFullscreen } },
                        scales: {
                            x: { ticks: { color: '#94a3b8', maxTicksLimit: isFullscreen ? 20 : 8 } },
                            y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'IPD (mm)', color: '#3b82f6' } },
                            y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Jitter (%)', color: '#ef4444' }, grid: { drawOnChartArea: false }, min: 0 }
                        }
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [data, testType, isFullscreen]);

            return (
                <div className="flex flex-col h-full">
                    <div className="flex-1 relative"><canvas ref={chartRef} style={{ width: '100%', height: '100%' }}></canvas></div>
                    <div className={`flex flex-wrap gap-3 mt-2 text-xs justify-center ${isFullscreen ? 'text-sm' : ''}`}>
                        <span className="text-slate-400 border-b border-dashed border-slate-400">חציית אמצע</span>
                        <span className="text-yellow-500 border-b border-dashed border-yellow-500">שינוי כיוון</span>
                        {testType === 'התכנסות (NPC)' && <span className="text-red-500 border-b-2 border-red-500 font-bold">שבירת התכנסות</span>}
                    </div>
                </div>
            );
        }

        // --- האפליקציה ---
        function App() {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const stimulusDivRef = useRef(null);
            const animationLoopRef = useRef(null);
            
            const [appStage, setAppStage] = useState('calibration');
            const [cameraActive, setCameraActive] = useState(false);
            const [testState, setTestState] = useState('idle');
            
            // כיול משודרג
            const [calibBoxWidth, setCalibBoxWidth] = useState(100); 
            const [manualDistanceCm, setManualDistanceCm] = useState(48); // קלט ידני למרחק
            const [isManualDistance, setIsManualDistance] = useState(false); // דגל שמזהה אם המשתמש הקליד ידנית
            const [calibData, setCalibData] = useState({ mmPerPx: 1, distanceCm: 50 }); 
            
            const isRecordingRef = useRef(false);
            const runStartTimeRef = useRef(null);
            const currentRunDataRef = useRef([]);
            const currentRunBlinksRef = useRef([]);
            const isBlinkingStateRef = useRef(false);
            const lastNormPosRef = useRef({ left: 50, right: 50 });
            const currentStimulusPosRef = useRef({ x: 50, y: 50, size: 40 });

            const [metrics, setMetrics] = useState({ ipdPx: 0, ipdMm: 0, leftNorm: 0, rightNorm: 0, jitter: 0 });
            const [testConfig, setTestConfig] = useState({ 
                type: 'tracking', color: '#3b82f6', durationSpeed: 2, trackVector: 'horizontal', 
                acuity: 50, npcSimulateCm: 5 
            });
            const [calculatedSizeMm, setCalculatedSizeMm] = useState(0);

            const [runLogs, setRunLogs] = useState([]);
            const [fullscreenChartData, setFullscreenChartData] = useState(null);

            useEffect(() => {
                let camera = null; let faceMesh = null;
                const startTracking = async () => {
                    if (!window.FaceMesh) return;
                    faceMesh = new window.FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
                    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
                    faceMesh.onResults(onResults);
                    camera = new window.Camera(videoRef.current, { onFrame: async () => { await faceMesh.send({ image: videoRef.current }); }, width: 640, height: 480 });
                    await camera.start();
                    setCameraActive(true);
                };
                setTimeout(startTracking, 1000);
            }, []);

            const appStageRef = useRef(appStage);
            useEffect(() => { appStageRef.current = appStage; }, [appStage]);

            // חישוב גודל הגירוי (Snellen Optotype)
            const getBaseStimulusSizePx = useCallback(() => {
                const distanceMeters = (calibData.distanceCm || 50) / 100;
                const mUnit = distanceMeters * (testConfig.acuity / 20);
                const sizeMm = mUnit * 1.45; // גובה של 1.0M במילימטרים
                const sizePx = sizeMm / (calibData.mmPerPx || 1);
                return { sizePx, sizeMm };
            }, [calibData, testConfig.acuity]);

            // עדכון המדד בתצוגה (מ"מ)
            useEffect(() => {
                const { sizeMm } = getBaseStimulusSizePx();
                setCalculatedSizeMm(sizeMm);
            }, [getBaseStimulusSizePx]);

            // תצוגה מקדימה חיה - משנה את גודל הגירוי בזמן אמת כשהמערכת ממתינה!
            useEffect(() => {
                if (testState === 'idle' && stimulusDivRef.current) {
                    const { sizePx } = getBaseStimulusSizePx();
                    stimulusDivRef.current.style.width = `${sizePx}px`;
                    stimulusDivRef.current.style.height = `${sizePx}px`;
                    stimulusDivRef.current.style.backgroundColor = testConfig.color;
                }
            }, [testState, testConfig.acuity, testConfig.color, getBaseStimulusSizePx]);

            const onResults = useCallback((results) => {
                const width = 640; const height = 480;
                if (canvasRef.current && appStageRef.current === 'calibration') {
                    const ctx = canvasRef.current.getContext('2d');
                    ctx.clearRect(0, 0, width, height);
                    ctx.drawImage(results.image, 0, 0, width, height);
                    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                        window.drawConnectors(ctx, results.multiFaceLandmarks[0], window.FACEMESH_TESSELATION, { color: '#C0C0C040', lineWidth: 0.5 });
                        window.drawConnectors(ctx, results.multiFaceLandmarks[0], window.FACEMESH_RIGHT_IRIS, { color: '#FF3030', lineWidth: 2 });
                        window.drawConnectors(ctx, results.multiFaceLandmarks[0], window.FACEMESH_LEFT_IRIS, { color: '#FF3030', lineWidth: 2 });
                    }
                }
                if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
                const lm = results.multiFaceLandmarks[0];

                const rightInnerX = lm[RIGHT_EYE_INNER].x; const rightOuterX = lm[RIGHT_EYE_OUTER].x;
                const leftInnerX = lm[LEFT_EYE_INNER].x; const leftOuterX = lm[LEFT_EYE_OUTER].x;
                const rightPupilX = lm[RIGHT_PUPIL].x; const rightPupilY = lm[RIGHT_PUPIL].y;
                const leftPupilX = lm[LEFT_PUPIL].x; const leftPupilY = lm[LEFT_PUPIL].y;

                const rightNorm = ((rightPupilX - rightInnerX) / (rightOuterX - rightInnerX)) * 100;
                const leftNorm = ((leftPupilX - leftOuterX) / (leftInnerX - leftOuterX)) * 100;

                const deltaLeft = Math.abs(leftNorm - lastNormPosRef.current.left);
                const deltaRight = Math.abs(rightNorm - lastNormPosRef.current.right);
                const currentJitter = (deltaLeft + deltaRight) / 2;
                lastNormPosRef.current = { left: leftNorm, right: rightNorm };

                const dx = (leftPupilX - rightPupilX) * width;
                const dy = (leftPupilY - rightPupilY) * height;
                const ipdPx = Math.sqrt(dx*dx + dy*dy);
                const currentMmPerPx = calibData.mmPerPx || 1;
                const currentIpdMm = ipdPx * currentMmPerPx;

                const rightEyeH = Math.abs(lm[RIGHT_EYE_TOP].y - lm[RIGHT_EYE_BOTTOM].y);
                const leftEyeH = Math.abs(lm[LEFT_EYE_TOP].y - lm[LEFT_EYE_BOTTOM].y);
                let justBlinked = false;
                if ((rightEyeH + leftEyeH)/2 < 0.025) {
                    if (!isBlinkingStateRef.current) { isBlinkingStateRef.current = true; justBlinked = true; }
                } else { isBlinkingStateRef.current = false; }

                if (isRecordingRef.current && runStartTimeRef.current) {
                    const timeOffset = (Date.now() - runStartTimeRef.current) / 1000;
                    if (justBlinked) currentRunBlinksRef.current.push(timeOffset);
                    currentRunDataRef.current.push({ 
                        timeOffset, ipd: parseFloat(currentIpdMm.toFixed(1)) || 0, leftNorm: parseFloat(leftNorm.toFixed(1)) || 0, 
                        rightNorm: parseFloat(rightNorm.toFixed(1)) || 0, jitterAvg: parseFloat(currentJitter.toFixed(2)) || 0,
                        blinkStatus: isBlinkingStateRef.current, stimulus: { ...currentStimulusPosRef.current } 
                    });
                    if (currentRunDataRef.current.length >= MAX_SAMPLES_PER_RUN) {
                        if (isRecordingRef.current) { alert("נעצר עקב הגבלת זיכרון."); handleTestSequence(); }
                    }
                }
                setMetrics({ ipdPx: ipdPx.toFixed(1), ipdMm: currentIpdMm.toFixed(1), leftNorm: leftNorm.toFixed(1), rightNorm: rightNorm.toFixed(1), jitter: currentJitter.toFixed(2) });
            }, [calibData.mmPerPx]);

            // מנוע האנימציה (רץ רק במצב running)
            useEffect(() => {
                if (testState !== 'running') {
                    if (animationLoopRef.current) cancelAnimationFrame(animationLoopRef.current);
                    return;
                }
                
                const startTime = Date.now();
                const { sizePx: baseSizePx } = getBaseStimulusSizePx();

                const animate = () => {
                    const t = (Date.now() - startTime) / 1000;
                    let x = 50, y = 50, size = baseSizePx;
                    
                    if (testConfig.type === 'tracking') {
                        const waveX = Math.sin(t * testConfig.durationSpeed) * 40;
                        if (testConfig.trackVector === 'horizontal') x = 50 + waveX;
                        if (testConfig.trackVector === 'vertical') y = 50 + waveX;
                        if (testConfig.trackVector === 'figure8') { x = 50 + waveX; y = 50 + Math.sin(t * testConfig.durationSpeed * 2) * 20; }
                    } else {
                        // התקרבות (NPC) - יחס של המרחק המקורי ליעד העצירה
                        const startDistCm = calibData.distanceCm || 50;
                        const endDistCm = testConfig.npcSimulateCm || 5;
                        const maxScale = startDistCm / endDistCm;
                        const maxSizePx = baseSizePx * maxScale;
                        
                        const scaleCycle = (Math.sin(t * testConfig.durationSpeed) + 1) / 2;
                        size = baseSizePx + scaleCycle * (maxSizePx - baseSizePx);
                    }
                    
                    currentStimulusPosRef.current = { x, y, size };
                    
                    if (stimulusDivRef.current) {
                        stimulusDivRef.current.style.left = `${x}%`;
                        stimulusDivRef.current.style.top = `${y}%`;
                        stimulusDivRef.current.style.width = `${size}px`;
                        stimulusDivRef.current.style.height = `${size}px`;
                    }
                    animationLoopRef.current = requestAnimationFrame(animate);
                };
                animationLoopRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationLoopRef.current);
            }, [testState, testConfig, getBaseStimulusSizePx, calibData.distanceCm]);

            // עדכון הסליידר של הכרטיס (מחשב מרחק אוטומטית אם המשתמש לא הקליד ידנית)
            const handleBoxWidthChange = (val) => {
                setCalibBoxWidth(val);
                if (!isManualDistance) {
                    setManualDistanceCm(Math.round(4763 / val));
                }
            };

            const handleManualDistanceChange = (val) => {
                setManualDistanceCm(val);
                setIsManualDistance(true); // נועל את המרחק לעריכה ידנית בלבד
            };

            const handleCalibrationDone = () => {
                // חייבים בכל מקרה צפיפות פיקסלים כדי להמיר למ"מ במציאות
                const mmPerPixelCalculated = CREDIT_CARD_WIDTH_MM / calibBoxWidth;

                setCalibData({
                    mmPerPx: mmPerPixelCalculated, 
                    distanceCm: manualDistanceCm // המרחק שישמש לנוסחת Snellen!
                });
                setAppStage('testing');
            };

            const handleTestSequence = () => {
                if (testState === 'idle') {
                    setTestState('countdown');
                    if(stimulusDivRef.current) {
                        const { sizePx } = getBaseStimulusSizePx();
                        stimulusDivRef.current.style.left = '50%'; stimulusDivRef.current.style.top = '50%';
                        stimulusDivRef.current.style.width = `${sizePx}px`; stimulusDivRef.current.style.height = `${sizePx}px`;
                    }
                    setTimeout(() => {
                        currentRunDataRef.current = []; currentRunBlinksRef.current = [];
                        runStartTimeRef.current = Date.now(); isRecordingRef.current = true;
                        setTestState('running');
                    }, 1000);
                } else if (testState === 'running') {
                    isRecordingRef.current = false; setTestState('idle');
                    if(stimulusDivRef.current) { stimulusDivRef.current.style.left = '50%'; stimulusDivRef.current.style.top = '50%'; }
                    
                    const duration = (Date.now() - runStartTimeRef.current) / 1000;
                    const finalData = JSON.parse(JSON.stringify(currentRunDataRef.current));
                    const logEntry = {
                        id: Date.now(), time: new Date().toLocaleTimeString(),
                        type: testConfig.type === 'tracking' ? `מעקב (${testConfig.trackVector})` : 'התכנסות (NPC)',
                        color: testConfig.color, duration: duration.toFixed(1), totalBlinks: currentRunBlinksRef.current.length,
                        data: finalData 
                    };
                    setRunLogs(prev => [logEntry, ...prev]);
                }
            };

            return (
                <div className="h-full w-full bg-slate-900 text-slate-100 font-sans overflow-hidden flex flex-col">
                    <div className="hidden"><video ref={videoRef} playsInline autoPlay muted /></div>

                    {/* --- מסך כיול מתקדם --- */}
                    <div style={{ display: appStage === 'calibration' ? 'flex' : 'none' }} className="flex-col items-center justify-center h-full p-8 text-center relative z-10 w-full">
                        <h1 className="text-4xl font-bold text-white mb-2">כיול קליני משולב (פיקסלים ומרחק)</h1>
                        <p className="text-slate-300 mb-6 max-w-3xl text-[15px] leading-relaxed">
                            כדי שגודל הגירוי והמדדים יהיו מדויקים ברמת המילימטר, חובה לכייל את המסך. <br/>
                            התאם את המלבן לכרטיס (מחשב אוטומטית צפיפות). תוכל לאשר את המרחק המשוער, או להקליד מרחק מדויק שנמדד.
                        </p>
                        
                        <div className="flex gap-8 items-stretch justify-center w-full max-w-5xl">
                            
                            {/* וידאו כיול כרטיס */}
                            <div className="relative w-[500px] h-[375px] bg-black rounded-xl overflow-hidden border-2 border-slate-700 shadow-xl shrink-0">
                                {!cameraActive && <div className="absolute inset-0 flex items-center justify-center text-slate-500">מצלמה בטעינה...</div>}
                                <canvas ref={canvasRef} className="absolute inset-0 w-full h-full transform -scale-x-100" width="640" height="480" />
                                <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 border-4 border-dashed border-blue-500 bg-blue-500/20 pointer-events-none flex items-center justify-center transition-all" 
                                     style={{ width: `${calibBoxWidth}px`, height: `${calibBoxWidth * 0.63}px` }}>
                                    <span className="text-blue-200 font-bold bg-black/50 px-1 rounded text-xs">85.6mm</span>
                                </div>
                            </div>

                            {/* לוח בקרה כיול */}
                            <div className="flex-1 bg-slate-800 p-6 rounded-xl border border-slate-700 flex flex-col justify-center gap-6">
                                <div>
                                    <label className="text-slate-300 font-bold block mb-2 text-sm text-right">1. התאם גודל כרטיס:</label>
                                    <input type="range" min="20" max="350" value={calibBoxWidth} onChange={(e) => handleBoxWidthChange(parseInt(e.target.value))} className="w-full accent-blue-500" />
                                </div>

                                <div className="bg-slate-900 p-4 rounded-lg border border-slate-700 text-right">
                                    <label className="text-slate-300 font-bold block mb-2 text-sm text-right">2. מרחק מהמסך (ס"מ):</label>
                                    <div className="flex items-center gap-4">
                                        <input type="number" value={manualDistanceCm} onChange={(e) => handleManualDistanceChange(parseInt(e.target.value))} 
                                               className="bg-slate-700 text-white font-mono text-xl p-2 rounded w-24 outline-none focus:border-blue-500 border border-transparent text-center"/>
                                        <div className="text-xs text-slate-500 leading-tight">
                                            {!isManualDistance ? 'המערכת משערכת מרחק אוטומטית לפי המצלמה. ניתן להקליד כדי לערוך ידנית.' : 'הוזן מרחק ידני קבוע.'}
                                        </div>
                                    </div>
                                </div>

                                <button onClick={handleCalibrationDone} className="mt-4 bg-green-600 hover:bg-green-500 text-white font-bold text-lg px-6 py-4 rounded-xl shadow-lg transition-transform hover:scale-[1.02]">
                                    שמור תצורת כיול והתחל
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* --- מסך המבדק --- */}
                    <div style={{ display: appStage === 'testing' ? 'flex' : 'none' }} className="flex-col h-full gap-4 p-4 relative z-10 w-full">
                        <header className="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center shrink-0 shadow-md">
                            <div>
                                <h1 className="text-xl font-bold text-blue-300">אבחון עוקב אופטומטרי (Live Render)</h1>
                                <div className="text-xs text-slate-400 mt-1 flex gap-4">
                                    <span>מרחק מטופל: <strong className="text-white">{calibData.distanceCm} ס"מ</strong></span>
                                    <span>| 1 מ"מ = <strong className="text-white">{(1/calibData.mmPerPx).toFixed(1)}</strong> פיקסלים</span>
                                    <span>| הגירוי במציאות: <strong className="text-white">{calculatedSizeMm.toFixed(2)} מ"מ</strong></span>
                                </div>
                            </div>
                            <div className="flex gap-4 items-center">
                                {testState === 'countdown' && <span className="text-yellow-400 font-bold animate-pulse">הכן את הנבדק...</span>}
                                {testState === 'running' && <span className="text-red-400 font-bold animate-pulse">⏺ מקליט נתונים</span>}
                                <button onClick={handleTestSequence} className={`px-8 py-3 rounded-lg font-bold text-white transition-all shadow-lg ${testState === 'running' ? 'bg-red-500 hover:bg-red-600' : testState === 'countdown' ? 'bg-yellow-500 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-500'}`} disabled={testState === 'countdown'}>
                                    {testState === 'running' ? '⏹ עצור מבדק' : '▶️ התחל מבדק'}
                                </button>
                            </div>
                        </header>

                        <div className="flex gap-4 flex-1 overflow-hidden">
                            <div className="flex-1 flex flex-col gap-4">
                                {/* מסך הגירוי */}
                                <div className="flex-1 bg-black rounded-xl border-2 border-slate-700 relative overflow-hidden shadow-inner cursor-crosshair">
                                    <div ref={stimulusDivRef} className={`absolute rounded-full border-2 border-white flex items-center justify-center transform -translate-x-1/2 -translate-y-1/2 shadow-[0_0_15px_rgba(255,255,255,0.4)] transition-colors duration-200 ${testState === 'countdown' ? 'animate-ping' : ''}`}
                                        style={{ display: 'flex', backgroundColor: testConfig.color, width: '40px', height: '40px', left: '50%', top: '50%' }}>
                                        <span className="text-white font-black drop-shadow-md pointer-events-none font-sans" style={{fontSize: '70%', lineHeight: 1}}>E</span>
                                    </div>
                                </div>

                                {/* בקרי שליטה ופרמטרים */}
                                <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 flex gap-6 shrink-0 shadow-lg">
                                    <div className="flex-[0.8] flex flex-col gap-2 border-l border-slate-700 pl-6">
                                        <span className="text-sm font-bold text-slate-300">סוג מבדק</span>
                                        <div className="flex gap-2">
                                            <button onClick={() => setTestConfig({...testConfig, type: 'tracking'})} className={`flex-1 py-2 text-xs rounded transition-colors ${testConfig.type === 'tracking' ? 'bg-blue-600 text-white font-bold' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}>מעקב</button>
                                            <button onClick={() => setTestConfig({...testConfig, type: 'convergence'})} className={`flex-1 py-2 text-xs rounded transition-colors ${testConfig.type === 'convergence' ? 'bg-blue-600 text-white font-bold' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}>התכנסות</button>
                                        </div>
                                        <div className="flex justify-between items-center mt-2">
                                            <span className="text-xs text-slate-400">צבע אופטוטיפ:</span>
                                            <div className="flex gap-1">
                                                {['#3b82f6', '#ef4444', '#22c55e', '#eab308'].map(c => (
                                                    <button key={c} onClick={() => setTestConfig({...testConfig, color: c})} className={`w-5 h-5 rounded-full border border-slate-600 ${testConfig.color === c ? 'border-white ring-1 ring-white' : ''}`} style={{backgroundColor: c}} />
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex-[2] flex flex-col gap-3">
                                        <div className="flex gap-6 items-center">
                                            {/* בקרת Snellen (מתעדכן בלייב) */}
                                            <div className="flex-1 flex flex-col gap-1 bg-slate-900 p-2 rounded border border-slate-700 shadow-inner">
                                                <span className="text-xs text-slate-400 flex justify-between">
                                                    <span>חדות נדרשת:</span>
                                                    <strong className="text-blue-300">Snellen 20/{testConfig.acuity}</strong>
                                                </span>
                                                <input type="range" min="20" max="200" step="10" value={testConfig.acuity} onChange={e => setTestConfig({...testConfig, acuity: parseInt(e.target.value)})} className="w-full accent-blue-500 mt-1 cursor-ew-resize"/>
                                            </div>

                                            {testConfig.type === 'tracking' ? (
                                                <div className="flex-1 flex flex-col gap-1">
                                                    <span className="text-xs text-slate-400">כיוון מעקב:</span>
                                                    <select value={testConfig.trackVector} onChange={e => setTestConfig({...testConfig, trackVector: e.target.value})} className="bg-slate-700 text-white text-sm p-1.5 rounded outline-none w-full border border-slate-600">
                                                        <option value="horizontal">אופקי</option><option value="vertical">אנכי</option><option value="figure8">שמיניה</option>
                                                    </select>
                                                </div>
                                            ) : (
                                                <div className="flex-1 flex flex-col gap-1">
                                                    <span className="text-xs text-slate-400 flex justify-between"><span>התקרבות ל:</span> <strong className="text-white">{testConfig.npcSimulateCm} ס"מ</strong></span>
                                                    <input type="range" min="2" max="20" step="1" value={testConfig.npcSimulateCm} onChange={e => setTestConfig({...testConfig, npcSimulateCm: parseInt(e.target.value)})} className="w-full accent-blue-500 mt-1"/>
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex flex-col gap-1 px-1">
                                            <span className="text-xs text-slate-400 flex justify-between"><span>מהירות האנימציה (Hz):</span> <span>{testConfig.durationSpeed}</span></span>
                                            <input type="range" min="0.5" max="5" step="0.5" value={testConfig.durationSpeed} onChange={e => setTestConfig({...testConfig, durationSpeed: parseFloat(e.target.value)})} className="w-full accent-blue-500"/>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="w-[450px] flex flex-col gap-4 shrink-0 overflow-hidden">
                                <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 grid grid-cols-2 gap-3 shrink-0 relative shadow-lg">
                                    <div className="bg-slate-900 p-2 rounded text-center border border-slate-700/50"><div className="text-[10px] text-slate-400">ימין מנורמל (%)</div><div className="text-2xl font-mono text-blue-400">{metrics.rightNorm}</div></div>
                                    <div className="bg-slate-900 p-2 rounded text-center border border-slate-700/50"><div className="text-[10px] text-slate-400">שמאל מנורמל (%)</div><div className="text-2xl font-mono text-blue-400">{metrics.leftNorm}</div></div>
                                    <div className="bg-slate-900 p-2 rounded text-center border border-slate-700/50"><div className="text-[10px] text-slate-400">IPD רגעי (מ"מ)</div><div className="text-2xl font-mono text-white">{metrics.ipdMm}</div></div>
                                    <div className="bg-slate-900 p-2 rounded text-center border border-slate-700/50"><div className="text-[10px] text-slate-400">ריצוד (Jitter)</div><div className="text-2xl font-mono text-red-400">{metrics.jitter}</div></div>
                                </div>

                                <div className="flex-1 bg-slate-800 rounded-xl border border-slate-700 p-4 overflow-y-auto shadow-lg">
                                    <h2 className="font-bold border-b border-slate-700 pb-2 mb-3 text-slate-200">📋 דוחות קליניים</h2>
                                    <div className="space-y-4">
                                        {runLogs.map((log, i) => (
                                            <div key={log.id} className="bg-slate-900 border border-slate-600 p-3 rounded-lg flex flex-col shadow-md">
                                                <div className="flex justify-between items-start mb-2">
                                                    <div><div className="font-bold text-sm text-blue-200">דוח #{runLogs.length - i} - {log.type}</div><div className="text-xs text-slate-400">{log.time} | משך: {log.duration}s</div></div>
                                                    <button onClick={() => setFullscreenChartData(log)} className="bg-slate-700 hover:bg-slate-600 text-white text-xs px-3 py-1.5 rounded border border-slate-500">🔍 הגדל</button>
                                                </div>
                                                <div className="h-[180px] w-full bg-black/40 rounded mt-1 border border-slate-700 p-1">
                                                    <RunCharts data={log.data} testType={log.type} isFullscreen={false} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {fullscreenChartData && (
                        <div className="fixed inset-0 z-50 bg-slate-900/95 flex flex-col p-8 backdrop-blur-md">
                            <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                                <div>
                                    <h2 className="text-3xl font-bold text-white mb-2">ניתוח גרפי מתקדם</h2>
                                    <p className="text-slate-400 text-sm">
                                        סוג בדיקה: <strong className="text-white">{fullscreenChartData.type}</strong> | 
                                        משך: <strong className="text-white">{fullscreenChartData.duration}s</strong> | 
                                        מצמוצים: <strong className="text-yellow-400">{fullscreenChartData.totalBlinks}</strong>
                                    </p>
                                </div>
                                <button onClick={() => setFullscreenChartData(null)} className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg">סגור ✖</button>
                            </div>
                            <div className="flex-1 bg-black/50 rounded-2xl border border-slate-700 p-6 flex flex-col">
                                <RunCharts data={fullscreenChartData.data} testType={fullscreenChartData.type} isFullscreen={true} />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
